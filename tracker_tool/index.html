solution:{brute:`// BRUTE FORCE — Same as optimal but without pruning (TLE on large inputs)
public IList<IList<int>> CombinationSumNoPrune(int[] candidates, int target) {
    var result = new List<IList<int>>();
    void Bt(int start, List<int> curr, int rem) {
        if (rem == 0) { result.Add(new List<int>(curr)); return; }
        if (rem < 0) return;  // no pruning by break — just return on negative
        for (int i = start; i < candidates.Length; i++) {
            curr.Add(candidates[i]);
            Bt(i, curr, rem - candidates[i]);
            curr.RemoveAt(curr.Count - 1);
        }
    }
    Bt(0, new List<int>(), target);
    return result;
}`,why:`Without sorting + pruning, we explore branches with candidates > remaining. Sorting enables early break: if candidates[i] > remaining, all subsequent candidates are also too large. This prunes the tree significantly.`,optimal:`// OPTIMAL — Backtracking with Sort + Pruning — O(n^(target/min)) time
public IList<IList<int>> CombinationSum(int[] candidates, int target) {
    Array.Sort(candidates);  // enables pruning
    var result = new List<IList<int>>();

    void Backtrack(int start, List<int> current, int remaining) {
        if (remaining == 0) { result.Add(new List<int>(current)); return; }
        for (int i = start; i < candidates.Length; i++) {
            if (candidates[i] > remaining) break;  // pruning: sorted, rest are larger
            current.Add(candidates[i]);
            Backtrack(i, current, remaining - candidates[i]);  // i not i+1: reuse allowed
            current.RemoveAt(current.Count - 1);
        }
    }

    Backtrack(0, new List<int>(), target);
    return result;
}`,alt:""}},

{id:"l39",name:"N-Queens",lcNum:"51",diff:"hard",pattern:"DFS / Backtracking",alts:["Bit Manipulation (ultra-optimized)"],
approach:"Place one queen per row. For each column in current row, check if it's safe (not attacked by any placed queen). Track attacked columns, diagonals (row-col), and anti-diagonals (row+col) in HashSets. Place, recurse to next row, remove. O(n!) time O(n) space.",
followups:["N-Queens II (LC 52) — count solutions only","Sudoku Solver (LC 37)","Valid Sudoku (LC 36)","Place N Rooks on chessboard"],
similar:["N-Queens II","Sudoku Solver","Permutations"],
notes:"Three attack sets needed: cols, diagonals (r-c, constant along diagonal), anti-diagonals (r+c, constant along anti-diagonal). Board reconstruction: for each row, place 'Q' at the stored column and '.' elsewhere.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try all column permutations, check validity for each
// O(n! · n²) — completely infeasible even for n=8
// Not shown — backtracking IS the correct approach`,why:`N-Queens requires exploring all valid placements — backtracking is the canonical solution. Using HashSets for columns, diagonals (r-c), anti-diagonals (r+c) reduces the validity check to O(1) per placement. Bit manipulation can speed it up further.`,optimal:`// OPTIMAL — Backtracking with HashSet attack tracking — O(n!) time, O(n) space
public IList<IList<string>> SolveNQueens(int n) {
    var result = new List<IList<string>>();
    var cols = new HashSet<int>();
    var diag = new HashSet<int>();     // row - col (constant along diagonal)
    var antiDiag = new HashSet<int>(); // row + col (constant along anti-diagonal)
    int[] queens = new int[n];         // queens[row] = column of queen in that row

    void Backtrack(int row) {
        if (row == n) {
            // build board from queens[]
            result.Add(queens.Select(col =>
                new string('.', col) + 'Q' + new string('.', n - col - 1)
            ).ToList());
            return;
        }
        for (int col = 0; col < n; col++) {
            if (cols.Contains(col) || diag.Contains(row-col) || antiDiag.Contains(row+col))
                continue;  // attacked
            cols.Add(col); diag.Add(row-col); antiDiag.Add(row+col);
            queens[row] = col;
            Backtrack(row + 1);
            cols.Remove(col); diag.Remove(row-col); antiDiag.Remove(row+col);
        }
    }

    Backtrack(0);
    return result;
}`,alt:""}},

{id:"l40",name:"Sudoku Solver",lcNum:"37",diff:"hard",pattern:"DFS / Backtracking",alts:["Constraint Propagation"],
approach:"Backtracking on empty cells. For each empty cell, try digits 1-9. Check if valid (not in same row, col, 3×3 box). If valid, place and recurse to next empty cell. If recursion returns false, backtrack (set back to '.'). O(9^(empty cells)) time O(1) extra space.",
followups:["Valid Sudoku (LC 36) — just validate, no solve","N-Queens (LC 51)","Word Search (LC 79)","Generate Parentheses (LC 22)"],
similar:["N-Queens","Valid Sudoku","Word Search"],
notes:"Box index = (row/3)*3 + col/3. Precompute which cells are empty and which are pre-filled once. Advanced: constraint propagation (arc consistency) dramatically prunes search space — mention as optimization.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try all digit placements for every empty cell without constraint checking
// O(9^81) — infeasible. Backtracking with constraint checking IS the approach.`,why:`Sudoku Solver requires exhaustive search — backtracking is the only feasible approach. The key optimization is the fast validity check using row/col/box sets so we don't scan the entire board each time.`,optimal:`// OPTIMAL — Backtracking with constraint sets — O(9^(empty cells)) time
public void SolveSudoku(char[][] board) {
    var rows = new HashSet<char>[9];
    var cols = new HashSet<char>[9];
    var boxes = new HashSet<char>[9];
    for (int i = 0; i < 9; i++) {
        rows[i] = new HashSet<char>(); cols[i] = new HashSet<char>(); boxes[i] = new HashSet<char>();
    }

    // pre-fill constraints from given digits
    for (int r = 0; r < 9; r++) for (int c = 0; c < 9; c++)
        if (board[r][c] != '.') {
            char ch = board[r][c];
            rows[r].Add(ch); cols[c].Add(ch); boxes[(r/3)*3+c/3].Add(ch);
        }

    bool Solve(int pos) {
        if (pos == 81) return true;
        int r = pos / 9, c = pos % 9;
        if (board[r][c] != '.') return Solve(pos + 1);

        int box = (r/3)*3 + c/3;
        for (char ch = '1'; ch <= '9'; ch++) {
            if (rows[r].Contains(ch) || cols[c].Contains(ch) || boxes[box].Contains(ch))
                continue;
            board[r][c] = ch;
            rows[r].Add(ch); cols[c].Add(ch); boxes[box].Add(ch);
            if (Solve(pos + 1)) return true;
            board[r][c] = '.';
            rows[r].Remove(ch); cols[c].Remove(ch); boxes[box].Remove(ch);
        }
        return false;
    }
    Solve(0);
}`,alt:""}},

solution:{brute:`// BRUTE FORCE — Sort, return element at index n-k — O(n log n) time
public int FindKthLargestSort(int[] nums, int k) {
    Array.Sort(nums);
    return nums[nums.Length - k];
}`,why:`Sorting is O(n log n) but we don't need everything sorted — just the kth largest. A min-heap of size k evicts the smallest when full, so the heap always holds the k largest seen so far. O(n log k) time, O(k) space.`,optimal:`// OPTIMAL — Min-Heap of size k — O(n log k) time, O(k) space
public int FindKthLargest(int[] nums, int k) {
    var heap = new PriorityQueue<int, int>();  // min-heap (lower priority = dequeued first)

    foreach (int num in nums) {
        heap.Enqueue(num, num);
        if (heap.Count > k) heap.Dequeue();  // evict smallest; heap holds k largest
    }

    return heap.Peek();  // top of min-heap = kth largest
}`,alt:`// ALTERNATE — QuickSelect — O(n) average, O(n²) worst case, O(1) space
public int FindKthLargestQuickSelect(int[] nums, int k) {
    k = nums.Length - k;  // convert to kth smallest (0-indexed)
    int Partition(int lo, int hi) {
        int pivot = nums[hi], p = lo;
        for (int i = lo; i < hi; i++)
            if (nums[i] <= pivot) (nums[p++], nums[i]) = (nums[i], nums[p]);
        (nums[p], nums[hi]) = (nums[hi], nums[p]);
        return p;
    }
    int lo = 0, hi = nums.Length - 1;
    while (lo < hi) {
        int p = Partition(lo, hi);
        if (p == k) break;
        else if (p < k) lo = p + 1;
        else hi = p - 1;
    }
    return nums[k];

approach:"Build frequency map O(n). Use min-heap of size k on (count, num) pairs. O(n log k) time O(n+k) space. Bucket sort alternative: create buckets indexed by frequency (1 to n), fill, iterate in reverse — O(n) time, O(n) space.",

notes:"Bucket sort is O(n) — often the expected solution at Google. Key: bucket[freq].Add(num) then iterate buckets from n down to 1. In C#: heap priority is the count, Enqueue(num, count), pop when size>k.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Sort by frequency, take last k — O(n log n) time
public int[] TopKFrequentSort(int[] nums, int k) {
    return nums.GroupBy(x => x)
               .OrderByDescending(g => g.Count())
               .Take(k)
               .Select(g => g.Key)
               .ToArray();
}`,why:`Sorting by frequency is O(n log n). We only need the top k — a min-heap of size k gives O(n log k). Even better: bucket sort by frequency gives O(n) — frequency can be at most n, so buckets[1..n] cover all cases.`,optimal:`// OPTIMAL — Bucket Sort — O(n) time, O(n) space
public int[] TopKFrequent(int[] nums, int k) {
    var freq = new Dictionary<int, int>();
    foreach (int n in nums) freq[n] = freq.GetValueOrDefault(n) + 1;

    // bucket[i] = list of numbers with frequency i
    var buckets = new List<int>[nums.Length + 1];
    for (int i = 0; i <= nums.Length; i++) buckets[i] = new List<int>();
    foreach (var (num, cnt) in freq) buckets[cnt].Add(num);

    var result = new List<int>();
    for (int i = buckets.Length - 1; i >= 1 && result.Count < k; i--)
        result.AddRange(buckets[i]);
    return result.Take(k).ToArray();
}`,alt:`// ALTERNATE — Min-Heap of size k — O(n log k) time, O(n+k) space
public int[] TopKFrequentHeap(int[] nums, int k) {
    var freq = new Dictionary<int, int>();
    foreach (int n in nums) freq[n] = freq.GetValueOrDefault(n) + 1;

    var heap = new PriorityQueue<int, int>();  // priority = frequency (min-heap)
    foreach (var (num, cnt) in freq) {
        heap.Enqueue(num, cnt);
        if (heap.Count > k) heap.Dequeue();  // evict least frequent
    }
    return heap.UnorderedItems.Select(x => x.Element).ToArray();
}`}},

approach:"Min-heap initialized with the head of each list (O(k log k)). Repeatedly extract min node, add to result, push its .next if exists. O(n log k) time O(k) space where n=total nodes, k=number of lists. Divide and conquer: merge lists pairwise, O(n log k) but O(log k) space.",

notes:"In C#, PriorityQueue doesn't handle ties stably. Compare by val only; if ties exist add a list-index tiebreaker. Divide and conquer avoids heap entirely — elegant recursion: mergeKLists = merge(mergeKLists(first half), mergeKLists(second half)).",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Merge lists one by one — O(k·n) time
public ListNode MergeKListsBrute(ListNode[] lists) {
    ListNode MergeTwo(ListNode l1, ListNode l2) {
        var dummy = new ListNode(0); var curr = dummy;
        while (l1 != null && l2 != null) {
            if (l1.val <= l2.val) { curr.next = l1; l1 = l1.next; }
            else { curr.next = l2; l2 = l2.next; }
            curr = curr.next;
        }
        curr.next = l1 ?? l2;
        return dummy.next;
    }
    ListNode result = null;
    foreach (var list in lists) result = MergeTwo(result, list);
    return result;
}`,why:`Merging one by one: first merge is O(n), second O(2n), ... total O(k·n). Min-heap always extracts the globally minimum head node in O(log k), giving O(n log k) where n is total nodes. Alternatively, divide and conquer merges pairwise: O(n log k) time with O(log k) recursion space.`,optimal:`// OPTIMAL — Min-Heap — O(n log k) time, O(k) space
public ListNode MergeKLists(ListNode[] lists) {
    var heap = new PriorityQueue<ListNode, int>();

    // seed with head of each non-null list
    foreach (var list in lists)
        if (list != null) heap.Enqueue(list, list.val);

    var dummy = new ListNode(0);
    var curr = dummy;

    while (heap.Count > 0) {
        var node = heap.Dequeue();
        curr.next = node;
        curr = curr.next;
        if (node.next != null) heap.Enqueue(node.next, node.next.val);
    }
    return dummy.next;
}`,alt:`// ALTERNATE — Divide and Conquer — O(n log k) time, O(log k) space
public ListNode MergeKListsDivide(ListNode[] lists) {
    if (lists.Length == 0) return null;
    int lo = 0, hi = lists.Length - 1;
    while (hi > 0) {
        lo = 0;
        while (lo < hi) {
            lists[lo] = MergeTwo(lists[lo], lists[hi]);
            lo++; hi--;
        }
    }
    return lists[0];
}
ListNode MergeTwo(ListNode l1, ListNode l2) {
    var d = new ListNode(0); var c = d;

notes:"Always insert into maxHeap first then conditionally move to minHeap (to handle the case where new element belongs in upper half). In C#: negate values for maxHeap simulation. Invariant: maxHeap.Count >= minHeap.Count.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Sorted list, O(n) insert, O(1) median
// Maintain a sorted list — O(n) per insertion
public class MedianFinderBrute {
    private List<int> sorted = new();
    public void AddNum(int num) {
        int pos = sorted.BinarySearch(num);
        sorted.Insert(pos < 0 ? ~pos : pos, num);  // O(n) shift
    }
    public double FindMedian() {
        int n = sorted.Count;
        return n % 2 == 0 ? (sorted[n/2-1] + sorted[n/2]) / 2.0 : sorted[n/2];
    }
}`,why:`List insertion is O(n) due to shifting. Two heaps maintain a dynamic partition: maxHeap for the lower half, minHeap for the upper half. Insertion O(log n), median O(1). The invariant: heaps are balanced (size difference ≤ 1).`,optimal:`// OPTIMAL — Two Heaps — O(log n) add, O(1) median
public class MedianFinder {
    // maxHeap: lower half (negate values for C# min-heap simulation)
    private PriorityQueue<int, int> maxHeap = new();
    // minHeap: upper half
    private PriorityQueue<int, int> minHeap = new();

    public void AddNum(int num) {
        // always add to maxHeap first
        maxHeap.Enqueue(num, -num);

        // balance: maxHeap's max must be <= minHeap's min
        if (minHeap.Count > 0 && -maxHeap.Peek() > minHeap.Peek()) {
            int top = maxHeap.Dequeue();  // was negated priority
            // re-extract the actual value (need to track separately)
            // Simpler: use a custom class or just track with SortedSets
            minHeap.Enqueue(-top, -top);  // move to minHeap
        }

        // rebalance sizes: maxHeap can have at most 1 extra
        if (maxHeap.Count > minHeap.Count + 1) {
            var (elem, pri) = maxHeap.UnorderedItems.First();
            maxHeap.Dequeue();
            minHeap.Enqueue(-pri, -pri);
        } else if (minHeap.Count > maxHeap.Count) {
            int elem = minHeap.Dequeue();
            maxHeap.Enqueue(elem, -elem);
        }
    }

    public double FindMedian() {
        if (maxHeap.Count > minHeap.Count) return -maxHeap.UnorderedItems.First().Priority;
        // even split
        return (-maxHeap.UnorderedItems.First().Priority + minHeap.Peek()) / 2.0;
    }
}`,alt:""}},

{id:"l45",name:"Task Scheduler",lcNum:"621",diff:"medium",pattern:"Heap / Priority Queue",alts:["Math Formula O(n)"],
approach:"Max-heap of task frequencies. Each CPU cycle: extract up to n+1 distinct tasks (or idle if not enough). Reduce their counts. Re-add non-zero counts. Track time. O(n log n) but since only 26 task types: O(n). Math formula: intervals = (maxFreq-1)*(n+1) + countOfMaxFreq. Answer = max(intervals, total tasks).",
followups:["Reorganize String (LC 767) — similar greedy placement","Minimum Number of CPU Cycles (variant)","IPO (LC 502)","Largest Number After Digit Swaps (LC 2231)"],
similar:["Reorganize String","IPO","Find Median from Data Stream"],
notes:"Math formula is O(n) and elegant — know both approaches. Formula: maxFreq tasks need (maxFreq-1) gaps of size n, plus the final group. If many high-frequency tasks, answer is just total task count (no idles needed).",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Simulate CPU cycles one by one — O(tasks·n) time
public int LeastIntervalBrute(char[] tasks, int n) {
    int[] freq = new int[26];
    foreach (char t in tasks) freq[t - 'A']++;
    int time = 0;
    while (true) {
        Array.Sort(freq); Array.Reverse(freq);
        int i = 0;
        while (i <= n) {
            if (freq.All(f => f == 0)) return time;
            if (i < 26 && freq[i] > 0) freq[i]--;
            time++; i++;
        }
    }
}`,why:`Simulation is O(tasks·n). The math formula insight: arrange tasks in frames of size (n+1). The most frequent task defines how many frames needed: (maxFreq-1)*(n+1) + countOfMaxFreq. Answer = max(that formula, total tasks).`,optimal:`// OPTIMAL — Math Formula — O(n) time, O(1) space
public int LeastInterval(char[] tasks, int n) {
    int[] freq = new int[26];
    foreach (char t in tasks) freq[t - 'A']++;
    int maxFreq = freq.Max();
    int countMax = freq.Count(f => f == maxFreq);
    // frames: (maxFreq-1) gaps of size n+1, plus final group of tasks with maxFreq
    int result = (maxFreq - 1) * (n + 1) + countMax;
    return Math.Max(result, tasks.Length);  // if many tasks, no idles needed
}`,alt:`// ALTERNATE — Max-Heap Greedy Simulation — O(tasks log 26) = O(tasks) time
public int LeastIntervalHeap(char[] tasks, int n) {
    int[] freq = new int[26];
    foreach (char t in tasks) freq[t-'A']++;
    var heap = new PriorityQueue<int,int>();  // max-heap (negate priority)
    foreach (int f in freq) if (f > 0) heap.Enqueue(f, -f);

    int time = 0;
    while (heap.Count > 0) {
        var cycle = new List<int>();
        for (int i = 0; i <= n; i++) {
            if (heap.Count > 0) cycle.Add(heap.Dequeue());
        }
        foreach (int c in cycle) if (c - 1 > 0) heap.Enqueue(c-1, -(c-1));
        time += heap.Count > 0 ? n + 1 : cycle.Count;
    }
    return time;
}`}},

solution:{brute:`// BRUTE FORCE — DFS for each node — O(n²) time
public int FindCircleNumDFS(int[][] isConnected) {
    int n = isConnected.Length;
    bool[] visited = new bool[n];
    int count = 0;
    void Dfs(int node) {
        visited[node] = true;
        for (int j = 0; j < n; j++)
            if (isConnected[node][j] == 1 && !visited[j]) Dfs(j);
    }
    for (int i = 0; i < n; i++)
        if (!visited[i]) { Dfs(i); count++; }
    return count;
}`,why:`DFS works and is O(n²) since we check all pairs anyway. Union-Find is also O(n²) here but is the preferred approach when the graph changes dynamically (new connections added). For this static problem, both are equivalent.`,optimal:`// OPTIMAL — Union-Find (DSU) — O(n² · α(n)) ≈ O(n²) time, O(n) space
public int FindCircleNum(int[][] isConnected) {
    int n = isConnected.Length;
    int[] parent = Enumerable.Range(0, n).ToArray();
    int[] rank = new int[n];
    int components = n;

    int Find(int x) {
        if (parent[x] != x) parent[x] = Find(parent[x]);  // path compression
        return parent[x];
    }
    void Union(int x, int y) {
        int px = Find(x), py = Find(y);
        if (px == py) return;
        if (rank[px] < rank[py]) parent[px] = py;
        else if (rank[px] > rank[py]) parent[py] = px;
        else { parent[py] = px; rank[px]++; }
        components--;
    }

    for (int i = 0; i < n; i++)
        for (int j = i + 1; j < n; j++)
            if (isConnected[i][j] == 1) Union(i, j);

    return components;
}`,alt:""}},

{id:"l47",name:"Redundant Connection",lcNum:"684",diff:"medium",pattern:"Union Find",alts:["DFS cycle detection"],
approach:"Process edges one by one. For each edge (u,v): if Find(u)==Find(v) → adding this edge creates a cycle → it's the redundant connection, return it. Else Union(u,v). O(n · α(n)) time O(n) space. The last such edge in the array is the answer.",
followups:["Redundant Connection II (LC 685) — directed graph variant","Number of Provinces (LC 547)","Graph Valid Tree (LC 261)","Making a Large Island (LC 827)"],
similar:["Number of Provinces","Graph Valid Tree","Accounts Merge"],
notes:"Greedy: process edges in order, first cycle-creating edge is the answer. This works because the problem guarantees exactly one redundant edge. Directed version (LC 685) is much harder — check for nodes with in-degree 2.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — DFS cycle detection, return the offending edge
public int[] FindRedundantConnectionDFS(int[][] edges) {
    var graph = Enumerable.Range(0, edges.Length+1).Select(_=>new List<int>()).ToList();
    bool[] visited = new bool[edges.Length + 1];

    bool HasPath(int src, int dst, int exclude) {
        if (src == dst) return true;
        visited[src] = true;
        foreach (int nb in graph[src])
            if (!visited[nb] && nb != exclude)
                if (HasPath(nb, dst, exclude)) return true;
        return false;
    }

    foreach (var e in edges) {
        Array.Fill(visited, false);
        if (HasPath(e[0], e[1], -1)) return e;  // path already exists
        graph[e[0]].Add(e[1]); graph[e[1]].Add(e[0]);
    }
    return new int[]{};
}`,why:`DFS to check path before each edge is O(n) per edge = O(n²) total. Union-Find: for each edge, if both endpoints have the same root, adding it would create a cycle — return it. Otherwise union. O(n·α(n)) ≈ O(n).`,optimal:`// OPTIMAL — Union-Find — O(n·α(n)) ≈ O(n) time, O(n) space
public int[] FindRedundantConnection(int[][] edges) {
    int n = edges.Length;
    int[] parent = Enumerable.Range(0, n + 1).ToArray();
    int[] rank = new int[n + 1];

    int Find(int x) {
        if (parent[x] != x) parent[x] = Find(parent[x]);
        return parent[x];
    }
    bool Union(int x, int y) {
        int px = Find(x), py = Find(y);
        if (px == py) return false;  // same component → adding creates cycle
        if (rank[px] < rank[py]) parent[px] = py;
        else if (rank[px] > rank[py]) parent[py] = px;
        else { parent[py] = px; rank[px]++; }
        return true;
    }

    foreach (var e in edges)
        if (!Union(e[0], e[1])) return e;  // cycle — this is the redundant edge

    return new int[]{};
}`,alt:""}},

solution:{brute:`// BRUTE FORCE — DFS on email adjacency graph — O(n·k·log(n·k)) time
public IList<IList<string>> AccountsMergeDFS(IList<IList<string>> accounts) {
    var emailToAccounts = new Dictionary<string, List<int>>();
    for (int i = 0; i < accounts.Count; i++)
        for (int j = 1; j < accounts[i].Count; j++) {
            if (!emailToAccounts.ContainsKey(accounts[i][j]))
                emailToAccounts[accounts[i][j]] = new List<int>();
            emailToAccounts[accounts[i][j]].Add(i);
        }
    var visited = new bool[accounts.Count];
    var result = new List<IList<string>>();
    for (int i = 0; i < accounts.Count; i++) {
        if (visited[i]) continue;
        var emails = new SortedSet<string>();
        var stack = new Stack<int>(); stack.Push(i);
        while (stack.Count > 0) {
            int acc = stack.Pop(); visited[acc] = true;
            for (int j = 1; j < accounts[acc].Count; j++) {
                emails.Add(accounts[acc][j]);
                foreach (int nb in emailToAccounts[accounts[acc][j]])
                    if (!visited[nb]) stack.Push(nb);
            }
        }
        var merged = new List<string> { accounts[i][0] };
        merged.AddRange(emails);
        result.Add(merged);
    }
    return result;
}`,why:`DFS on email graph works but is complex to implement correctly. Union-Find maps emails to account indices, unions accounts sharing emails, then groups by root. Cleaner and handles merges naturally.`,optimal:`// OPTIMAL — Union-Find on account indices — O(n·k·α·log) time
public IList<IList<string>> AccountsMerge(IList<IList<string>> accounts) {
    int n = accounts.Count;
    int[] parent = Enumerable.Range(0, n).ToArray();
    int Find(int x) { if(parent[x]!=x) parent[x]=Find(parent[x]); return parent[x]; }
    void Union(int x, int y) { parent[Find(x)] = Find(y); }

    var emailToIndex = new Dictionary<string, int>();
    for (int i = 0; i < n; i++)
        for (int j = 1; j < accounts[i].Count; j++) {
            if (emailToIndex.TryGetValue(accounts[i][j], out int prev))
                Union(i, prev);  // same email → same account
            else
                emailToIndex[accounts[i][j]] = i;
        }

    // group emails by root
    var groups = new Dictionary<int, SortedSet<string>>();
    for (int i = 0; i < n; i++)
        for (int j = 1; j < accounts[i].Count; j++) {
            int root = Find(i);
            if (!groups.ContainsKey(root)) groups[root] = new SortedSet<string>();
            groups[root].Add(accounts[i][j]);
        }

    var result = new List<IList<string>>();
    foreach (var (root, emails) in groups) {
        var merged = new List<string> { accounts[root][0] };
        merged.AddRange(emails);
        result.Add(merged);
    }
    return result;
}`,alt:""}},

        while (stack.Count > 0 && temperatures[i] > temperatures[stack.Peek()]) {
            int idx = stack.Pop();
            result[idx] = i - idx;  // days to wait

{id:"l52",name:"Largest Rectangle in Histogram",lcNum:"84",diff:"hard",pattern:"Monotonic Stack",alts:["Divide and Conquer O(n log n)"],
approach:"Monotonic increasing stack (stores indices). For each bar i: while stack not empty and heights[stack.Peek()] > heights[i], pop height h, compute width = stack empty ? i : i - stack.Peek() - 1. Area = h * width. Push sentinel 0 at end. O(n) time O(n) space.",

notes:"Sentinel 0 at the end forces all remaining bars to be popped. Width formula when popping index i: if stack empty → width = current index, else width = current - stack.Peek() - 1. This is one of the hardest monotonic stack problems — draw it out first.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²) — for each bar, try all wider rectangles
public int LargestRectangleAreaBrute(int[] heights) {
    int maxArea = 0;
    for (int i = 0; i < heights.Length; i++) {
        int minH = heights[i];
        for (int j = i; j < heights.Length; j++) {
            minH = Math.Min(minH, heights[j]);
            maxArea = Math.Max(maxArea, minH * (j - i + 1));
        }
    }
    return maxArea;
}`,why:`O(n²) tries all pairs. Monotonic increasing stack: for each bar popped (because current is shorter), it's the height of a maximal rectangle extending from the new stack top + 1 to the current index - 1. Each bar processed once — O(n).`,optimal:`// OPTIMAL — Monotonic Increasing Stack — O(n) time, O(n) space
public int LargestRectangleArea(int[] heights) {
    var stack = new Stack<int>();  // indices, heights increase bottom to top
    int maxArea = 0;
    int n = heights.Length;

    for (int i = 0; i <= n; i++) {
        int h = i == n ? 0 : heights[i];  // sentinel 0 forces all remaining to pop

        while (stack.Count > 0 && h < heights[stack.Peek()]) {
            int height = heights[stack.Pop()];
            int width = stack.Count == 0 ? i : i - stack.Peek() - 1;
            maxArea = Math.Max(maxArea, height * width);

{id:"l53",name:"Trapping Rain Water (Stack)",lcNum:"42",diff:"hard",pattern:"Monotonic Stack",alts:["Two Pointers O(1) space","Prefix/Suffix Max Arrays"],
approach:"Monotonic stack approach: maintain decreasing stack of indices. When current height > stack top, the top can trap water. Pop top as 'bottom', compute width between new top and current, height = min(heights[new top], heights[current]) - heights[bottom]. O(n) time O(n) space.",

solution:{brute:`// Same as l8 — brute force for Trapping Rain Water:
public int TrapBruteStack(int[] height) {
    int total = 0;
    for (int i = 1; i < height.Length - 1; i++) {
        int lMax = 0, rMax = 0;
        for (int j = 0; j <= i; j++) lMax = Math.Max(lMax, height[j]);
        for (int j = i; j < height.Length; j++) rMax = Math.Max(rMax, height[j]);
        total += Math.Min(lMax, rMax) - height[i];
    }
    return total;
}`,why:`The monotonic stack approach computes water HORIZONTALLY (layer by layer between bars) rather than vertically per column. Both O(n) but stack approach is useful to understand the 'horizontal water level' visualization.`,optimal:`// OPTIMAL — Monotonic Stack (Horizontal layers) — O(n) time, O(n) space
public int TrapStack(int[] height) {
    var stack = new Stack<int>();  // indices, decreasing heights
    int total = 0;

    for (int i = 0; i < height.Length; i++) {
        while (stack.Count > 0 && height[i] > height[stack.Peek()]) {
            int bottom = stack.Pop();    // the valley floor
            if (stack.Count == 0) break; // no left wall
            int width = i - stack.Peek() - 1;
            int waterH = Math.Min(height[stack.Peek()], height[i]) - height[bottom];
            total += waterH * width;
        }
        stack.Push(i);
    }
    return total;
}`,alt:`// ALTERNATE — Two Pointers (preferred for O(1) space) — see l8
public int TrapTwoPointers(int[] height) {
    int l=0, r=height.Length-1, lMax=0, rMax=0, total=0;
    while(l<r) {
        if(height[l]<height[r]) { lMax=Math.Max(lMax,height[l]); total+=lMax-height[l++]; }
        else { rMax=Math.Max(rMax,height[r]); total+=rMax-height[r--]; }
    }
    return total;
}`}},

{id:"l54",name:"Remove K Digits",lcNum:"402",diff:"medium",pattern:"Monotonic Stack",alts:["Greedy"],
approach:"Monotonic increasing stack. For each digit, while stack not empty and top > current and k > 0: pop (remove a larger digit), decrement k. Push current digit. After iteration if k > 0, remove from end. Build string from stack, strip leading zeros. O(n) time O(n) space.",
followups:["Remove Duplicate Letters (LC 316) — similar greedy stack","Largest Number After Digit Swaps (LC 2231)","Create Maximum Number (LC 321)","Smallest Subsequence of Distinct Characters (LC 1081)"],
similar:["Remove Duplicate Letters","Monotone Increasing Digits","Create Maximum Number"],
notes:"Greedy insight: to minimize number, remove larger digits that appear before smaller ones. Increasing stack ensures we keep the smallest possible digits at each position. Edge case: result is all zeros → return '0'.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try removing each combination of k digits — O(n^k) — infeasible
// Practical brute: try all k-length subsets to remove, pick min result
// Not implemented — exponential. Greedy stack IS the approach.`,why:`We want to minimize the number by removing k digits. Greedy: scan left to right, if current digit < stack top, remove the top (it's better to have a smaller digit earlier). Monotonic increasing stack naturally finds these cases. O(n).`,optimal:`// OPTIMAL — Monotonic Increasing Stack — O(n) time, O(n) space
public string RemoveKdigits(string num, int k) {
    var stack = new Stack<char>();  // monotonic increasing

    foreach (char d in num) {
        // remove larger digits before smaller ones
        while (k > 0 && stack.Count > 0 && stack.Peek() > d) {
            stack.Pop();
            k--;
        }
        stack.Push(d);
    }

    // if k > 0, remove from end (stack is sorted: end has largest)
    while (k-- > 0) stack.Pop();

    // build result (stack is in reverse order)
    var result = new string(stack.Reverse().ToArray());

    // strip leading zeros
    result = result.TrimStart('0');
    return result.Length == 0 ? "0" : result;
}`,alt:""}},

solution:{brute:`// BRUTE FORCE — O(n²) — check all subarrays
public int SubarraySumBrute(int[] nums, int k) {
    int count = 0;
    for (int i = 0; i < nums.Length; i++) {
        int sum = 0;
        for (int j = i; j < nums.Length; j++) {
            sum += nums[j];
            if (sum == k) count++;
        }
    }
    return count;
}`,why:`O(n²) recalculates sums from scratch. Prefix sum insight: subarray[i..j] sum = prefix[j+1] - prefix[i]. If we need prefix[j+1] - prefix[i] = k, then prefix[i] = prefix[j+1] - k. HashMap stores prefix sum counts; we look up the complement as we scan. O(n).`,optimal:`// OPTIMAL — Prefix Sum + HashMap — O(n) time, O(n) space
public int SubarraySum(int[] nums, int k) {
    var prefixCount = new Dictionary<int, int> { [0] = 1 };  // {0:1} handles subarrays starting at index 0
    int sum = 0, count = 0;

    foreach (int num in nums) {
        sum += num;
        // if (sum - k) was seen before, those many subarrays ending here have sum k
        count += prefixCount.GetValueOrDefault(sum - k);
        prefixCount[sum] = prefixCount.GetValueOrDefault(sum) + 1;
    }

}`,alt:""}},

approach:"Two-pass approach without division. Forward pass: result[i] = product of all elements to the left. Backward pass: multiply result[i] by product of all elements to the right (track running right product). O(n) time O(1) extra space (output array doesn't count).",

solution:{brute:`// BRUTE FORCE — O(n²) — for each element, multiply all others
public int[] ProductExceptSelfBrute(int[] nums) {
    int n = nums.Length;
    int[] result = new int[n];
    for (int i = 0; i < n; i++) {
        result[i] = 1;
        for (int j = 0; j < n; j++)
            if (j != i) result[i] *= nums[j];
    }
    return result;
}`,why:`O(n²) recomputes products. Two-pass approach: forward pass computes left products into result[], backward pass multiplies by running right product. O(n) time, O(1) extra space (output array doesn't count).`,optimal:`// OPTIMAL — Two-Pass (Left × Right products) — O(n) time, O(1) extra space
public int[] ProductExceptSelf(int[] nums) {
    int n = nums.Length;
    int[] result = new int[n];

    // forward pass: result[i] = product of all elements to the LEFT of i
    result[0] = 1;
    for (int i = 1; i < n; i++)
        result[i] = result[i-1] * nums[i-1];

    // backward pass: multiply by product of all elements to the RIGHT of i
    int rightProduct = 1;
    for (int i = n - 1; i >= 0; i--) {
        result[i] *= rightProduct;
        rightProduct *= nums[i];
    }
    return result;
}`,alt:""}},

approach:"Prefix sum mod k. If two prefix sums have the same mod, the subarray between them is divisible by k. Store {remainder: first_seen_index} in map. Initialize {0: -1}. If (currentSum % k) seen at index j, and i - j >= 2 → valid. O(n) time O(k) space.",

public bool CheckSubarraySumBrute(int[] nums, int k) {
    for (int i = 0; i < nums.Length - 1; i++) {
        int sum = nums[i];
        for (int j = i + 1; j < nums.Length; j++) {
            sum += nums[j];
            if (k != 0 && sum % k == 0 && j - i + 1 >= 2) return true;
            if (k == 0 && sum == 0) return true;
        }
    }
    return false;
}`,why:`O(n²) checks all subarrays. Key insight: if two prefix sums have the same remainder mod k, the subarray between them is divisible by k. HashMap stores first occurrence of each remainder. O(n).`,optimal:`// OPTIMAL — Prefix Sum mod k + HashMap — O(n) time, O(k) space

solution:{brute:`// BRUTE FORCE — O(n²) — two DFS passes from each node as root
public int PathSumIIIBrute(TreeNode root, int targetSum) {
    int count = 0;
    void CountFrom(TreeNode node, long remaining) {
        if (node == null) return;
        if (remaining == node.val) count++;
        CountFrom(node.left, remaining - node.val);
        CountFrom(node.right, remaining - node.val);
    }
    void Dfs(TreeNode node) {
        if (node == null) return;
        CountFrom(node, targetSum);
        Dfs(node.left); Dfs(node.right);
    }
    Dfs(root);
    return count;
}`,why:`O(n²): for each node as root, count paths downward. Prefix sum on tree: maintain running sum from root, store prefix counts in HashMap. At each node check if (currentSum - target) exists. O(n) — same trick as Subarray Sum Equals K but on a tree.`,optimal:`// OPTIMAL — DFS + Prefix Sum HashMap — O(n) time, O(h) space
public int PathSum(TreeNode root, long targetSum) {
    var prefixCount = new Dictionary<long, int> { [0] = 1 };
    int count = 0;

    void Dfs(TreeNode node, long currentSum) {
        if (node == null) return;
        currentSum += node.val;

        // paths ending at this node with sum == targetSum
        count += prefixCount.GetValueOrDefault(currentSum - targetSum);

        // add current sum before going deeper
        prefixCount[currentSum] = prefixCount.GetValueOrDefault(currentSum) + 1;

        Dfs(node.left, currentSum);
        Dfs(node.right, currentSum);

        // BACKTRACK: remove current sum when leaving (critical!)
        prefixCount[currentSum]--;
    }

    Dfs(root, 0);
    return count;
}`,alt:""}},

public class Trie {
    private class TrieNode {
        public Dictionary<char, TrieNode> Children = new();
        public bool IsEnd = false;
    }
    private TrieNode root = new TrieNode();

    public void Insert(string word) {
        var node = root;
        foreach (char ch in word) {
            if (!node.Children.ContainsKey(ch))
                node.Children[ch] = new TrieNode();
            node = node.Children[ch];
        }
        node.IsEnd = true;
    }

    public bool Search(string word) {
        var node = Traverse(word);
        return node != null && node.IsEnd;
    }

    public bool StartsWith(string prefix) => Traverse(prefix) != null;

    private TrieNode Traverse(string s) {
        var node = root;
        foreach (char ch in s) {
            if (!node.Children.ContainsKey(ch)) return null;
            node = node.Children[ch];
        }
        return node;
    }
}`,alt:`// ALTERNATE — Array[26] children (faster for lowercase only)

solution:{brute:`// BRUTE FORCE — DFS for each word separately — O(words · m·n·4^L)
public IList<string> FindWordsBrute(char[][] board, string[] words) {
    var result = new HashSet<string>();
    int m = board.Length, n = board[0].Length;
    bool Dfs(int r, int c, string word, int idx) {
        if(idx==word.Length) return true;
        if(r<0||r>=m||c<0||c>=n||board[r][c]!=word[idx]) return false;
        char tmp=board[r][c]; board[r][c]='#';
        bool found=Dfs(r+1,c,word,idx+1)||Dfs(r-1,c,word,idx+1)||
                   Dfs(r,c+1,word,idx+1)||Dfs(r,c-1,word,idx+1);
        board[r][c]=tmp; return found;
    }
    foreach(string w in words)
        for(int r=0;r<m;r++) for(int c=0;c<n;c++)
            if(Dfs(r,c,w,0)) { result.Add(w); break; }
    return result.ToList();
}`,why:`Separate DFS per word doesn't share prefix work. Trie: build all words into a trie, then one DFS pass over the board. At each cell, traverse the trie simultaneously — if no trie path exists, prune immediately. Massive speedup when words share prefixes.`,optimal:`// OPTIMAL — Trie + DFS with pruning — O(m·n·4^L) but practically much faster
public IList<string> FindWords(char[][] board, string[] words) {
    // Build Trie
    var root = new TrieNode();
    foreach (string w in words) {
        var node = root;
        foreach (char c in w) { node.Children.TryAdd(c, new TrieNode()); node = node.Children[c]; }
        node.Word = w;  // store word at end node
    }

    int m = board.Length, n = board[0].Length;
    var result = new List<string>();

    void Dfs(int r, int c, TrieNode node) {
        if (r<0||r>=m||c<0||c>=n||board[r][c]=='#') return;
        char ch = board[r][c];
        if (!node.Children.TryGetValue(ch, out var next)) return;  // prune

        if (next.Word != null) { result.Add(next.Word); next.Word = null; }  // found (null to dedup)

        board[r][c] = '#';
        Dfs(r+1,c,next); Dfs(r-1,c,next); Dfs(r,c+1,next); Dfs(r,c-1,next);
        board[r][c] = ch;

        // optimization: prune trie nodes with no remaining words
        if (next.Children.Count == 0 && next.Word == null) node.Children.Remove(ch);
    }

    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            Dfs(r, c, root);

    return result;
}

private class TrieNode {
    public Dictionary<char, TrieNode> Children = new();
    public string Word = null;
}`,alt:""}},

approach:"Trie with wildcard support. Insert is standard. Search: if current char is '.', recurse into ALL children. If specific char, recurse into that child only. O(L) for insert, O(26^dots · L) worst case for search with wildcards.",
followups:["Implement Trie (LC 208) — foundation","Word Search II (LC 212)","Replace Words (LC 648)","Prefix and Suffix Search (LC 745)"],

solution:{brute:`// BRUTE FORCE — Regex matching or checking all words in dictionary
// For each search call, scan all inserted words — O(words · L) per search
public class WordDictionaryBrute {
    private List<string> words = new();
    public void AddWord(string word) => words.Add(word);
    public bool Search(string word) =>
        words.Any(w => w.Length == word.Length &&
            w.Zip(word, (a, b) => b == '.' || a == b).All(x => x));
}`,why:`Linear scan per query is O(words·L). Trie reduces non-wildcard paths to O(L). Wildcard '.' requires branching into all children — still much faster than scanning all words since most branches are pruned early.`,optimal:`// OPTIMAL — Trie with wildcard DFS — O(L) to O(26^dots · L) per search
public class WordDictionary {
    private class TrieNode {
        public TrieNode[] ch = new TrieNode[26];
        public bool end;
    }
    private TrieNode root = new TrieNode();

    public void AddWord(string word) {
        var node = root;
        foreach (char c in word) {
            int i = c - 'a';
            node.ch[i] ??= new TrieNode();
            node = node.ch[i];
        }
        node.end = true;
    }

    public bool Search(string word) => Dfs(word, 0, root);

    private bool Dfs(string word, int idx, TrieNode node) {
        if (node == null) return false;
        if (idx == word.Length) return node.end;

        char c = word[idx];
        if (c == '.') {
            // wildcard: try all children
            foreach (var child in node.ch)
                if (Dfs(word, idx + 1, child)) return true;
            return false;
        }
        return Dfs(word, idx + 1, node.ch[c - 'a']);
    }
}`,alt:""}},

{id:"l63",name:"Replace Words",lcNum:"648",diff:"medium",pattern:"Tries (Prefix Trees)",alts:["Sort by length + HashSet"],
approach:"Build Trie from root dictionary. For each word in sentence, traverse Trie char by char. If node.IsEnd → replace word with root found so far. If traversal ends without finding a root → keep original word. O(sum of root lengths + sentence length) time.",

solution:{brute:`// BRUTE FORCE — Sort roots by length, try each prefix with HashSet
public string ReplaceWordsBrute(IList<string> dictionary, string sentence) {
    var roots = dictionary.OrderBy(r => r.Length).ToList();
    var words = sentence.Split(' ');
    for (int i = 0; i < words.Length; i++)
        foreach (string root in roots)
            if (words[i].StartsWith(root)) { words[i] = root; break; }
    return string.Join(" ", words);
}`,why:`Sorting + StartsWith is O(sum of root lengths per word). Trie: insert all roots. For each word, traverse trie char by char — the first time we hit IsEnd, that's the shortest root. O(L) per word lookup vs O(R·L) for the sort approach.`,optimal:`// OPTIMAL — Trie prefix lookup — O(total root chars + sentence chars) time
public string ReplaceWords(IList<string> dictionary, string sentence) {
    // Build Trie from roots
    var root = new TrieNode();
    foreach (string r in dictionary) {
        var node = root;
        foreach (char c in r) { node.ch.TryAdd(c, new TrieNode()); node = node.ch[c]; }
        node.IsEnd = true;
    }

    var words = sentence.Split(' ');
    for (int i = 0; i < words.Length; i++) {
        var node = root;
        int j = 0;
        for (; j < words[i].Length; j++) {
            if (!node.ch.TryGetValue(words[i][j], out node)) break;
            if (node.IsEnd) { words[i] = words[i].Substring(0, j + 1); break; }
        }
    }
    return string.Join(" ", words);
}
private class TrieNode { public Dictionary<char, TrieNode> ch = new(); public bool IsEnd; }`,alt:""}},

{id:"l64",name:"Maximum XOR of Two Numbers in an Array",lcNum:"421",diff:"medium",pattern:"Tries (Prefix Trees)",alts:["Brute Force O(n²)"],
approach:"Binary Trie storing 32-bit numbers MSB to LSB. For each number, traverse trie greedily: try the opposite bit first (to maximize XOR). If opposite bit path exists → take it (contributes 1 to result). Else take same bit path. O(32n) = O(n) time O(32n) = O(n) space.",
followups:["Maximum XOR with an Element from Array (LC 1707)","Find Maximum XOR Sum of Array (variant)","Count Pairs with XOR in Range (LC 1803)"],
similar:["Implement Trie","Maximum XOR With an Element From Array"],
notes:"Binary Trie: each node has only two children (0 and 1). Insert each number bit by bit from MSB. Query: greedily pick the bit that maximizes XOR (prefer opposite bit). This is the signature 'XOR optimization' Trie technique.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²) — try all pairs
public int FindMaximumXORBrute(int[] nums) {
    int maxXor = 0;
    for (int i = 0; i < nums.Length; i++)
        for (int j = i + 1; j < nums.Length; j++)
            maxXor = Math.Max(maxXor, nums[i] ^ nums[j]);
    return maxXor;
}`,why:`O(n²) tries all pairs. Binary Trie: insert all numbers bit by bit (MSB first). For each number, greedily choose the OPPOSITE bit at each level (to maximize XOR). If opposite bit path exists, take it. O(32n) = O(n).`,optimal:`// OPTIMAL — Binary Trie (MSB to LSB) — O(n) time, O(n) space
public int FindMaximumXOR(int[] nums) {
    // Build binary Trie
    int[][] children = new int[nums.Length * 32 + 1][];
    for (int i = 0; i < children.Length; i++) children[i] = new[] { -1, -1 };
    int nodeCount = 1;

    void Insert(int num) {
        int node = 0;
        for (int bit = 31; bit >= 0; bit--) {
            int b = (num >> bit) & 1;
            if (children[node][b] == -1) children[node][b] = nodeCount++;
            node = children[node][b];
        }
    }

    int QueryMax(int num) {
        int node = 0, xor = 0;
        for (int bit = 31; bit >= 0; bit--) {
            int b = (num >> bit) & 1;
            int want = 1 - b;  // prefer opposite bit
            if (children[node][want] != -1) { xor |= (1 << bit); node = children[node][want]; }
            else node = children[node][b];  // fallback
        }
        return xor;
    }

    foreach (int num in nums) Insert(num);
    return nums.Max(num => QueryMax(num));
}`,alt:""}},

solution:{brute:`// BRUTE FORCE — DFS cycle detection (3-color) — O(V+E) time
public bool CanFinishTopoSortDFS(int numCourses, int[][] prerequisites) {
    var graph = Enumerable.Range(0,numCourses).Select(_=>new List<int>()).ToList();
    foreach(var p in prerequisites) graph[p[1]].Add(p[0]);
    int[] color = new int[numCourses];
    bool HasCycle(int v) {
        color[v]=1;
        foreach(int nb in graph[v]) {
            if(color[nb]==1) return true;
            if(color[nb]==0&&HasCycle(nb)) return true;
        }
        color[v]=2; return false;
    }
    for(int i=0;i<numCourses;i++) if(color[i]==0&&HasCycle(i)) return false;
    return true;
}`,why:`DFS is recursive — risks stack overflow for large inputs. Kahn's BFS is iterative: track in-degrees, start from nodes with no prerequisites, and process layer by layer. If all nodes are processed, no cycle exists. Easier to code and extend to Course Schedule II.`,optimal:`// OPTIMAL — Kahn's BFS (In-degree) — O(V+E) time, O(V+E) space
public bool CanFinish(int numCourses, int[][] prerequisites) {
    var graph = Enumerable.Range(0, numCourses).Select(_ => new List<int>()).ToList();
    int[] inDegree = new int[numCourses];

    foreach (var p in prerequisites) {
        graph[p[1]].Add(p[0]);
        inDegree[p[0]]++;
    }

    var queue = new Queue<int>();
    for (int i = 0; i < numCourses; i++)
        if (inDegree[i] == 0) queue.Enqueue(i);

    int processed = 0;
    while (queue.Count > 0) {
        int course = queue.Dequeue();
        processed++;
        foreach (int next in graph[course])
            if (--inDegree[next] == 0) queue.Enqueue(next);
    }

    return processed == numCourses;  // cycle → some nodes never reach in-degree 0
}`,alt:""}},

{id:"l67",name:"Alien Dictionary",lcNum:"269",diff:"hard",pattern:"Topological Sort",alts:["DFS-based topo sort"],
approach:"Build character ordering graph from adjacent words in word list. For each pair of adjacent words, find first differing char — that gives an ordering edge. Then run Kahn's (or DFS) topological sort on the character graph. If cycle exists or adjacent words have longer prefix first → invalid input. O(C) where C=total chars across all words.",
followups:["Course Schedule (LC 207) — same Kahn's template","Course Schedule II (LC 210)","Sequence Reconstruction (LC 444)","Minimum Cost to Connect All Points via ordering"],
similar:["Course Schedule","Course Schedule II","Sequence Reconstruction"],
notes:"Edge case: if words[i] is a prefix of words[i-1] → return '' (invalid ordering). Build graph only from first differing char per adjacent pair — all remaining chars don't constrain ordering. Use a set for edges to avoid duplicates.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try all character orderings — O(26!) — infeasible
// Only valid approach: build graph from adjacent word pairs, run topo sort`,why:`Build a directed graph from ordering constraints extracted from adjacent word pairs. First differing character in consecutive words defines a directed edge. Then run Kahn's topological sort. O(C) where C = total characters across all words.`,optimal:`// OPTIMAL — Build graph from word pairs + Kahn's — O(C) time
public string AlienOrder(string[] words) {
    var graph = new Dictionary<char, HashSet<char>>();
    var inDegree = new Dictionary<char, int>();

    // initialize all chars
    foreach (string word in words)
        foreach (char c in word) { graph.TryAdd(c, new HashSet<char>()); inDegree.TryAdd(c, 0); }

    // build edges from adjacent word pairs
    for (int i = 0; i < words.Length - 1; i++) {
        string w1 = words[i], w2 = words[i+1];
        if (w1.Length > w2.Length && w1.StartsWith(w2)) return "";  // invalid input
        for (int j = 0; j < Math.Min(w1.Length, w2.Length); j++) {
            if (w1[j] != w2[j]) {
                if (graph[w1[j]].Add(w2[j])) inDegree[w2[j]]++;  // only add once
                break;
            }
        }
    }

    // Kahn's topological sort
    var queue = new Queue<char>();
    foreach (var (c, deg) in inDegree) if (deg == 0) queue.Enqueue(c);

    var result = new System.Text.StringBuilder();
    while (queue.Count > 0) {
        char c = queue.Dequeue();
        result.Append(c);
        foreach (char next in graph[c])
            if (--inDegree[next] == 0) queue.Enqueue(next);
    }

    return result.Length == inDegree.Count ? result.ToString() : "";  // cycle → return ""
}`,alt:""}},

{id:"l68",name:"Sequence Reconstruction",lcNum:"444",diff:"medium",pattern:"Topological Sort",alts:["Direct comparison"],
approach:"Build ordering graph from all sequences. Run Kahn's. For the sequence to be the unique reconstruction: at every step the queue must have exactly 1 node (no ambiguity). If queue ever has 2+ nodes → multiple valid orderings exist. Final order must match org. O(V+E) time.",
followups:["Course Schedule II (LC 210)","Alien Dictionary (LC 269)","Minimum Unique Graph Labeling","Topological Sort uniqueness check"],
similar:["Course Schedule II","Alien Dictionary","Course Schedule"],
notes:"The uniqueness condition is the key difference: queue size must be 1 at all times. If queue size > 1 → return false (multiple valid orderings). If final order != org → false. This tests deeper understanding of Kahn's beyond just detecting cycles.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Generate all topological orderings, check if unique — O(n! · edges)
// Completely infeasible. Kahn's with queue-size check IS the efficient approach.`,why:`The key insight: if at any point in Kahn's the queue has MORE than 1 node, there are multiple valid orderings — uniqueness fails. We don't need to enumerate all orderings; just check the queue size at each step.`,optimal:`// OPTIMAL — Kahn's + Uniqueness Check (queue size == 1 always) — O(V+E) time
public bool SequenceReconstruction(int[] org, IList<IList<int>> sequences) {
    int n = org.Length;
    var graph = Enumerable.Range(0, n + 1).Select(_ => new HashSet<int>()).ToList();
    int[] inDegree = new int[n + 1];

    foreach (var seq in sequences)
        for (int i = 0; i < seq.Count - 1; i++) {
            int u = seq[i], v = seq[i+1];
            if (graph[u].Add(v)) inDegree[v]++;
        }

    var queue = new Queue<int>();
    for (int i = 1; i <= n; i++) if (inDegree[i] == 0) queue.Enqueue(i);

    int idx = 0;
    while (queue.Count > 0) {
        if (queue.Count > 1) return false;  // ambiguous: multiple valid orderings
        int node = queue.Dequeue();
        if (org[idx++] != node) return false;  // doesn't match original sequence
        foreach (int next in graph[node])
            if (--inDegree[next] == 0) queue.Enqueue(next);
    }

    return idx == n;  // all nodes processed in correct unique order
}`,alt:""}},

{id:"l69",name:"Build a Matrix With Conditions",lcNum:"2392",diff:"hard",pattern:"Topological Sort",alts:["DFS-based topo sort"],
approach:"Run two independent topological sorts: one for row conditions, one for column conditions. Get row order → for each number record its row index. Get column order → record col index. Construct the k×k matrix placing each number at (rowPos[num], colPos[num]). If either topo sort detects a cycle → return empty. O(k + conditions) time.",
followups:["Course Schedule II (LC 210)","Alien Dictionary (LC 269)","Strange Printer II (LC 1591)"],
similar:["Course Schedule II","Alien Dictionary","Sequence Reconstruction"],
notes:"Two completely independent Kahn's runs — one per dimension. The insight: row and column placement problems are independent. Cycle in either dimension → impossible. Clean separation of concerns makes this problem much simpler than it looks.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try all k² cell placements — O(k² · (k+C)) — TLE
// No meaningful brute force — two independent Kahn's runs is already O(k + conditions)`,why:`Row and column placements are INDEPENDENT constraints. Run two completely separate Kahn's topological sorts — one for rowConditions, one for colConditions. Then place number i at (rowPos[i], colPos[i]) in the matrix. If either has a cycle → impossible.`,optimal:`// OPTIMAL — Two independent Kahn's sorts — O(k + conditions) time
public int[][] BuildMatrix(int k, int[][] rowConditions, int[][] colConditions) {
    int[] TopoSort(int[][] conditions) {
        var graph = Enumerable.Range(0, k+1).Select(_=>new List<int>()).ToList();
        int[] inDeg = new int[k+1];
        foreach(var c in conditions) { graph[c[0]].Add(c[1]); inDeg[c[1]]++; }
        var queue = new Queue<int>();
        for(int i=1;i<=k;i++) if(inDeg[i]==0) queue.Enqueue(i);
        var order = new int[k+1]; int idx=0;
        while(queue.Count>0) { int node=queue.Dequeue(); order[node]=idx++;
            foreach(int nb in graph[node]) if(--inDeg[nb]==0) queue.Enqueue(nb); }
        return idx==k ? order : null;  // null = cycle detected
    }

    int[] rowPos = TopoSort(rowConditions);
    int[] colPos = TopoSort(colConditions);
    if (rowPos == null || colPos == null) return Array.Empty<int[]>();

    int[][] matrix = Enumerable.Range(0, k).Select(_ => new int[k]).ToArray();
    for (int num = 1; num <= k; num++)
        matrix[rowPos[num]][colPos[num]] = num;

    return matrix;
}`,alt:""}}

public int MaxDepthBFS(TreeNode root) {
    if (root == null) return 0;
    var queue = new Queue<TreeNode>();
    queue.Enqueue(root);
    int depth = 0;
    while (queue.Count > 0) {
        int size = queue.Count;
        depth++;
        for (int i = 0; i < size; i++) {
            var node = queue.Dequeue();
            if (node.left  != null) queue.Enqueue(node.left);
            if (node.right != null) queue.Enqueue(node.right);
        }
    }
    return depth;
}`}},

{id:"l72",name:"Binary Tree Maximum Path Sum",lcNum:"124",diff:"hard",pattern:"Trees",alts:["DFS with global max"],
approach:"DFS returning the max gain from each node (max single-branch path including node). At each node: gain = node.val + max(0, leftGain) + max(0, rightGain) — this is the candidate answer through this node. Update global max. Return node.val + max(0, max(leftGain, rightGain)) upward. O(n) O(h).",
followups:["Diameter of Binary Tree (LC 543)","Longest Univalue Path (LC 687)","Path Sum III (LC 437)","Maximum Sum BST in Binary Tree (LC 1373)"],
similar:["Diameter of Binary Tree","Path Sum","Maximum Depth"],
notes:"Negative values are valid — clamping contributions to 0 means 'don't include this subtree'. Can't return the full through-node path upward since a path can only fork at one node.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²): collect all root-to-leaf paths and try all pairs
// Complex to implement correctly — just know why it's bad`,why:`A brute force collecting all paths is O(n²) and complex. Key insight: a path in a tree either (a) passes through a node as the 'peak' — using both left and right branches — or (b) continues upward. Handle (a) as the candidate answer, return (b) to parent.`,optimal:`// OPTIMAL — DFS with global max — O(n) time, O(h) space
int _ans = int.MinValue;
public int MaxPathSum(TreeNode root) {
    _ans = int.MinValue;
    MaxGain(root);
    return _ans;
}
int MaxGain(TreeNode node) {
    if (node == null) return 0;
    int leftGain  = Math.Max(MaxGain(node.left),  0); // clamp negatives to 0
    int rightGain = Math.Max(MaxGain(node.right), 0);
    _ans = Math.Max(_ans, node.val + leftGain + rightGain); // candidate
    return node.val + Math.Max(leftGain, rightGain);        // return best branch
}`,alt:""}},

{id:"l73",name:"Lowest Common Ancestor of a Binary Tree",lcNum:"236",diff:"medium",pattern:"Trees",alts:["Parent pointer map + ancestor set"],
approach:"DFS: if node is null/p/q return node. Recurse left and right. If both sides return non-null → current node is LCA. If only one side returns non-null → that side contains both p and q, propagate up. O(n) O(h).",
followups:["LCA of BST (LC 235) — use BST property","LCA of Deepest Leaves (LC 1123)","Kth Ancestor of a Tree Node (LC 1483)","Distance Between Two Nodes"],
similar:["Path Sum","Binary Tree Maximum Path Sum","Validate BST"],
notes:"For BST (LC 235): if both p,q < node → go left; if both > node → go right; else current is LCA. That's O(h) instead of O(n). For general tree use this O(n) approach.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — store path from root to each node, find last common node
// O(n) time but O(n) extra space for storing paths`,why:`Storing full paths uses O(n) extra space. The recursive approach is elegant: if we find p or q at a node, we 'report' it upward. When both sides report, the current node is the meeting point — the LCA.`,optimal:`// OPTIMAL — Recursive DFS — O(n) time, O(h) space
public TreeNode LowestCommonAncestor(TreeNode root, TreeNode p, TreeNode q) {
    if (root == null || root == p || root == q) return root;

    TreeNode left  = LowestCommonAncestor(root.left,  p, q);
    TreeNode right = LowestCommonAncestor(root.right, p, q);

    // Both sides found something → current node is LCA
    if (left != null && right != null) return root;
    // Only one side found → propagate that result up
    return left ?? right;
}`,alt:""}},

{id:"l74",name:"Validate Binary Search Tree",lcNum:"98",diff:"medium",pattern:"Trees",alts:["Inorder traversal (must be strictly increasing)"],
approach:"DFS passing valid range [min, max] down. Each node must satisfy min < node.val < max. Left subtree: max becomes node.val. Right subtree: min becomes node.val. O(n) O(h). Alternative: inorder traversal must be strictly increasing.",
followups:["Recover Binary Search Tree (LC 99)","Convert Sorted Array to BST (LC 108)","Kth Smallest in BST (LC 230)","BST Iterator (LC 173)"],
similar:["Binary Tree Level Order","Lowest Common Ancestor BST","Count Nodes in BST range"],
notes:"Common mistake: only checking immediate parent-child relationship. Must pass bounds all the way down. Use long.MinValue/MaxValue to handle int boundary nodes.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — collect inorder, check strictly increasing — O(n) time O(n) space
public bool IsValidBSTBrute(TreeNode root) {
    var vals = new List<int>();
    InOrder(root, vals);
    for (int i = 1; i < vals.Count; i++)
        if (vals[i] <= vals[i-1]) return false;
    return true;
}
void InOrder(TreeNode n, List<int> list) {
    if (n == null) return;
    InOrder(n.left, list); list.Add(n.val); InOrder(n.right, list);
}`,why:`Storing inorder uses O(n) space. We can validate during the DFS itself by passing allowed bounds — O(1) extra space (ignoring recursion stack).`,optimal:`// OPTIMAL — DFS with bounds — O(n) time, O(h) space
public bool IsValidBST(TreeNode root) => Validate(root, long.MinValue, long.MaxValue);
bool Validate(TreeNode node, long min, long max) {
    if (node == null) return true;
    if (node.val <= min || node.val >= max) return false;
    return Validate(node.left,  min,       node.val)
        && Validate(node.right, node.val,  max);
}`,alt:""}},

{id:"l75",name:"Merge Intervals",lcNum:"56",diff:"medium",pattern:"Intervals",alts:["Sort + sweep","Line sweep with events"],
approach:"Sort intervals by start time. Iterate: if current interval overlaps with last merged (cur.start <= last.end), merge by extending last.end = max(last.end, cur.end). Otherwise append new interval. O(n log n) sort + O(n) sweep.",
followups:["Insert Interval (LC 57)","Non-overlapping Intervals (LC 435)","Meeting Rooms (LC 252)","Meeting Rooms II (LC 253)","Employee Free Time (LC 759)"],
similar:["Insert Interval","Non-overlapping Intervals","Interval List Intersections"],
notes:"Sort by start ensures we only need to look at the last merged interval. Overlap condition: cur.start <= last.end (not strictly less — touching intervals [1,2],[2,3] should merge). Return result.ToArray().",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²): repeatedly scan for any overlapping pair and merge
public int[][] MergeIntervalsBrute(int[][] intervals) {
    var list = intervals.ToList();
    bool merged = true;
    while (merged) {
        merged = false;
        for (int i = 0; i < list.Count && !merged; i++)
            for (int j = i+1; j < list.Count && !merged; j++)
                if (list[i][0] <= list[j][1] && list[j][0] <= list[i][1]) {
                    list[i] = new[]{Math.Min(list[i][0],list[j][0]),Math.Max(list[i][1],list[j][1])};
                    list.RemoveAt(j); merged = true;
                }
    }
    return list.ToArray();
}`,why:`Repeatedly scanning for overlapping pairs is O(n²) per merge, O(n³) total. Sorting by start time means we only ever need to compare against the LAST merged interval — overlaps are contiguous after sorting.`,optimal:`// OPTIMAL — Sort by start + sweep — O(n log n) time, O(n) space
public int[][] Merge(int[][] intervals) {
    Array.Sort(intervals, (a, b) => a[0] - b[0]);
    var result = new List<int[]> { intervals[0] };

    for (int i = 1; i < intervals.Length; i++) {
        int[] last = result[^1];
        int[] cur  = intervals[i];
        if (cur[0] <= last[1])
            last[1] = Math.Max(last[1], cur[1]); // extend
        else
            result.Add(cur); // no overlap — new interval
    }
    return result.ToArray();
}`,alt:`// ALTERNATE — Insert Interval style: return merged list directly
// Same complexity, useful when you need to insert a new interval too`}},

{id:"l76",name:"Non-overlapping Intervals",lcNum:"435",diff:"medium",pattern:"Intervals",alts:["Greedy sort by end","DP O(n²)"],
approach:"Greedy: sort by end time. Keep a 'prevEnd' tracking the end of the last kept interval. For each interval: if it starts >= prevEnd, keep it (update prevEnd). Otherwise remove it (increment count). Maximizes kept = minimizes removed. O(n log n).",
followups:["Merge Intervals (LC 56)","Minimum Number of Arrows to Burst Balloons (LC 452)","Video Stitching (LC 1024)","Jump Game II (LC 45)"],
similar:["Merge Intervals","Meeting Rooms","Minimum Number of Arrows"],
notes:"Sorting by END (not start) is the key insight — activity selection problem. Greedy proof: always keeping the interval that ends earliest leaves maximum room for future intervals.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — DP: dp[i] = max non-overlapping intervals ending at i — O(n²)
public int EraseOverlapBrute(int[][] intervals) {
    Array.Sort(intervals, (a,b) => a[0] - b[0]);
    int n = intervals.Length;
    int[] dp = new int[n]; Array.Fill(dp, 1);
    for (int i = 1; i < n; i++)
        for (int j = 0; j < i; j++)
            if (intervals[j][1] <= intervals[i][0])
                dp[i] = Math.Max(dp[i], dp[j] + 1);
    return n - dp.Max();
}`,why:`DP is O(n²). Greedy is provably optimal here (activity selection): always keep the interval ending earliest — it "wastes" the least future space. Sort by end, greedily keep non-overlapping.`,optimal:`// OPTIMAL — Greedy sort by end — O(n log n) time, O(1) space
public int EraseOverlapIntervals(int[][] intervals) {
    Array.Sort(intervals, (a, b) => a[1] - b[1]); // sort by END
    int removed = 0, prevEnd = int.MinValue;

    foreach (var iv in intervals) {
        if (iv[0] >= prevEnd)
            prevEnd = iv[1]; // keep: starts after prev ends
        else
            removed++;       // overlap: remove this one
    }
    return removed;
}`,alt:""}},

{id:"l77",name:"Meeting Rooms II",lcNum:"253",diff:"medium",pattern:"Intervals",alts:["Min-heap of end times","Line sweep events"],
approach:"Two sorted arrays (starts, ends). Use two-pointer sweep: if next start < earliest end, need new room (rooms++). Otherwise a room freed (end pointer advances). Track max rooms. O(n log n). Min-heap alternative: heap of end times, pop if compatible. O(n log n).",
followups:["Meeting Rooms I (LC 252) — just check any overlap","Employee Free Time (LC 759)","Car Pooling (LC 1094)","My Calendar III (LC 732)"],
similar:["Merge Intervals","Non-overlapping Intervals","Task Scheduler"],
notes:"Two-pointer approach avoids heap entirely. Sort starts and ends separately (don't need them paired). At each step: if a meeting starts before the earliest-ending meeting ends → new room needed.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²): for each interval count how many others overlap with it
public int MinMeetingRoomsBrute(int[][] intervals) {
    int maxRooms = 0;
    foreach (var iv in intervals) {
        int rooms = 1;
        foreach (var other in intervals)
            if (other != iv && other[0] < iv[1] && iv[0] < other[1]) rooms++;
        maxRooms = Math.Max(maxRooms, rooms);
    }
    return maxRooms;
}`,why:`Checking all pairs is O(n²). With sorted events, we can process starts and ends in order and just count the running 'active' meetings — O(n log n) sort then O(n) sweep.`,optimal:`// OPTIMAL — Two sorted arrays — O(n log n) time, O(n) space
public int MinMeetingRooms(int[][] intervals) {
    int n = intervals.Length;
    int[] starts = intervals.Select(i => i[0]).OrderBy(x=>x).ToArray();
    int[] ends   = intervals.Select(i => i[1]).OrderBy(x=>x).ToArray();

    int rooms = 0, maxRooms = 0, e = 0;
    for (int s = 0; s < n; s++) {
        if (starts[s] < ends[e]) rooms++; // new meeting before any ends
        else                     e++;     // reuse freed room
        maxRooms = Math.Max(maxRooms, rooms);
    }
    return maxRooms;
}`,alt:`// ALTERNATE — Min-heap of end times — O(n log n) time, O(n) space
public int MinMeetingRoomsHeap(int[][] intervals) {
    Array.Sort(intervals, (a,b) => a[0] - b[0]);
    var heap = new PriorityQueue<int,int>(); // end times
    foreach (var iv in intervals) {
        if (heap.Count > 0 && heap.Peek() <= iv[0]) heap.Dequeue();
        heap.Enqueue(iv[1], iv[1]);
    }
    return heap.Count;
}`}},

{id:"l78",name:"Jump Game",lcNum:"55",diff:"medium",pattern:"Greedy",alts:["DP O(n²)","BFS O(n)"],
approach:"Greedy: track 'reach' = farthest index reachable so far. For each index i, if i > reach → gap, return false. Otherwise update reach = max(reach, i + nums[i]). If we get through all indices, return true. O(n) O(1).",
followups:["Jump Game II (LC 45) — minimum jumps","Jump Game III (LC 1306) — can reach index with value 0","Jump Game IV (LC 1345) — BFS with same-value jumps","Jump Game VI (LC 1696) — max score"],
similar:["Jump Game II","Gas Station","Minimum Number of Arrows"],
notes:"DP approach: dp[i] = can reach index i. O(n²). Greedy is much simpler: we don't need to know HOW to reach each point, just WHETHER we can. Track max reach greedily.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE / DP — O(n²) time, O(n) space
public bool CanJumpDP(int[] nums) {
    bool[] dp = new bool[nums.Length]; dp[0] = true;
    for (int i = 1; i < nums.Length; i++)
        for (int j = 0; j < i; j++)
            if (dp[j] && j + nums[j] >= i) { dp[i] = true; break; }
    return dp[nums.Length - 1];
}`,why:`DP checks all previous positions for each index — O(n²). Greedy insight: we only need to track the FARTHEST reachable index. If current index is within reach, extend reach. No need to remember individual reachability.`,optimal:`// OPTIMAL — Greedy max reach — O(n) time, O(1) space
public bool CanJump(int[] nums) {
    int reach = 0;
    for (int i = 0; i < nums.Length; i++) {
        if (i > reach) return false;        // gap — can't proceed
        reach = Math.Max(reach, i + nums[i]);
    }
    return true;
}`,alt:`// ALTERNATE — Work backwards: mark index 'good' if it can reach a good index
// O(n) time but O(n) space
public bool CanJumpBackward(int[] nums) {
    int lastGood = nums.Length - 1;
    for (int i = nums.Length - 2; i >= 0; i--)
        if (i + nums[i] >= lastGood) lastGood = i;
    return lastGood == 0;
}`}},

{id:"l79",name:"Jump Game II",lcNum:"45",diff:"medium",pattern:"Greedy",alts:["BFS (levels = jumps)","DP O(n²)"],
approach:"Greedy BFS-style: track current jump range [curStart..curEnd] and farthest reachable in this jump. When we exhaust current range, we must take another jump — increment count and set range to [curEnd+1..farthest]. O(n) O(1).",
followups:["Jump Game (LC 55)","Jump Game III (LC 1306)","Video Stitching (LC 1024)","Minimum Number of Taps (LC 1326)"],
similar:["Jump Game","Minimum Number of Arrows","Gas Station"],
notes:"Never actually jump to farthest immediately. Just track what's reachable if we take one more jump from any position in the current range. When range exhausted → forced to jump → count++.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE / DP — O(n²) time, O(n) space
public int JumpDP(int[] nums) {
    int n = nums.Length;
    int[] dp = new int[n]; Array.Fill(dp, int.MaxValue); dp[0] = 0;
    for (int i = 1; i < n; i++)
        for (int j = 0; j < i; j++)
            if (dp[j] != int.MaxValue && j + nums[j] >= i)
                dp[i] = Math.Min(dp[i], dp[j] + 1);
    return dp[n-1];
}`,why:`DP is O(n²). Greedy works because we never benefit from making a shorter jump when a longer one is available — we want to maximize each jump's reach. Process positions level by level (BFS-style) without an actual queue.`,optimal:`// OPTIMAL — Greedy implicit BFS — O(n) time, O(1) space
public int Jump(int[] nums) {
    int jumps = 0, curEnd = 0, farthest = 0;
    for (int i = 0; i < nums.Length - 1; i++) {
        farthest = Math.Max(farthest, i + nums[i]);
        if (i == curEnd) {   // reached end of current jump range
            jumps++;
            curEnd = farthest; // extend to farthest reachable
        }
    }
    return jumps;
}`,alt:""}},

{id:"l80",name:"Gas Station",lcNum:"134",diff:"medium",pattern:"Greedy",alts:["Two-pass: find start + verify"],
approach:"If total gas >= total cost, a solution always exists and is unique. Find the starting station: run a simulation tracking running tank. Whenever tank < 0, the start must be after current index (reset tank=0, start=i+1). O(n) O(1).",
followups:["Jump Game (LC 55)","Minimum Cost to Connect Sticks (LC 1167)","Task Scheduler (LC 621)","Partition Labels (LC 763)"],
similar:["Jump Game","Candy","Queue Reconstruction by Height"],
notes:"Key insight: if total sum >= 0, solution exists. The start is always right after the worst cumulative deficit point. Single pass handles both existence check and start finding.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²): try every starting station
public int CanCompleteCircuitBrute(int[] gas, int[] cost) {
    int n = gas.Length;
    for (int start = 0; start < n; start++) {
        int tank = 0; bool ok = true;
        for (int i = 0; i < n; i++) {
            tank += gas[(start+i)%n] - cost[(start+i)%n];
            if (tank < 0) { ok = false; break; }
        }
        if (ok) return start;
    }
    return -1;
}`,why:`Trying every start is O(n²). Key insight: if we run out of gas at station k when starting from s, then no station between s and k can be the start either (they all have a smaller prefix sum). Restart from k+1.`,optimal:`// OPTIMAL — Single pass greedy — O(n) time, O(1) space
public int CanCompleteCircuit(int[] gas, int[] cost) {
    int total = 0, tank = 0, start = 0;
    for (int i = 0; i < gas.Length; i++) {
        int diff = gas[i] - cost[i];
        total += diff;
        tank  += diff;
        if (tank < 0) {       // can't reach i+1 from 'start'
            start = i + 1;    // must start after i
            tank  = 0;
        }
    }
    return total >= 0 ? start : -1;
}`,alt:""}},

public int SingleNumberBrute(int[] nums) {

{id:"l83",name:"Counting Bits",lcNum:"338",diff:"easy",pattern:"Bit Manipulation",alts:["DP with LSB","Brian Kernighan per number"],
approach:"DP: dp[i] = dp[i >> 1] + (i & 1). Right shift removes the LSB; the count of set bits for i/2 plus whether i is odd gives dp[i]. Build for all i in [0..n] in O(n).",
followups:["Number of 1 Bits (LC 191)","Sum of Two Integers (LC 371)","Reverse Bits (LC 190)","Find the Difference (LC 389)"],
similar:["Number of 1 Bits","Single Number","Missing Number"],
notes:"Three DP relations all work: dp[i]=dp[i>>1]+(i&1), or dp[i]=dp[i&(i-1)]+1 (clear last set bit), or dp[i]=dp[i/2]+(i%2). The first is simplest to remember.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n log n): count bits for each number independently
public int[] CountBitsBrute(int n) {
    int[] res = new int[n+1];
    for (int i = 0; i <= n; i++) {
        int x = i, c = 0;
        while (x > 0) { x &= x-1; c++; }
        res[i] = c;
    }
    return res;
}`,why:`Counting bits independently per number is O(n log n). DP reuses previously computed results: the bit count of i equals the bit count of i/2 plus the last bit of i. O(n) overall.`,optimal:`// OPTIMAL — DP — O(n) time, O(n) space
public int[] CountBits(int n) {
    int[] dp = new int[n + 1];
    for (int i = 1; i <= n; i++)
        dp[i] = dp[i >> 1] + (i & 1); // i>>1 = i/2; i&1 = last bit
    return dp;
}`,alt:""}},
