{id:"l85",name:"Count of Smaller Numbers After Self",lcNum:"315",diff:"hard",pattern:"Segment Tree / BIT",alts:["Merge sort","BIT with coordinate compression"],
approach:"Process right to left. For each number, query BIT for count of elements already inserted that are smaller (prefix sum up to num-1). Then insert num into BIT. Coordinate compress values to [1..n] range first. O(n log n).",
followups:["Reverse Pairs (LC 493)","Count of Range Sum (LC 327)","Global and Local Inversions (LC 775)","Count Inversions (merge sort classic)"],
similar:["Range Sum Query Mutable","Reverse Pairs","Sort Array by Power Value"],
notes:"Coordinate compress: map values to rank [1..n]. Process right-to-left so 'already inserted' means 'to the right'. BIT query gives count of smaller elements already seen (to the right).",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²): for each element count smaller to its right
public IList<int> CountSmallerBrute(int[] nums) {
    int n = nums.Length;
    int[] res = new int[n];
    for (int i = 0; i < n; i++)
        for (int j = i+1; j < n; j++)
            if (nums[j] < nums[i]) res[i]++;
    return res;
}`,why:`O(n²) nested loop. BIT with coordinate compression processes elements right-to-left: inserting into BIT, then querying prefix sum gives count of smaller elements already inserted (which are all to the right).`,optimal:`// OPTIMAL — BIT + coordinate compression — O(n log n)
public IList<int> CountSmaller(int[] nums) {
    int n = nums.Length;
    int[] sorted = nums.Distinct().OrderBy(x=>x).ToArray();
    int Rank(int v) => Array.BinarySearch(sorted, v) + 1; // 1-indexed

    int[] tree = new int[sorted.Length + 2];
    void Update(int i) { for (; i < tree.Length; i += i&(-i)) tree[i]++; }
    int Query(int i) { int s=0; for (;i>0;i-=i&(-i)) s+=tree[i]; return s; }

    var res = new int[n];
    for (int i = n-1; i >= 0; i--) {
        int r = Rank(nums[i]);
        res[i] = Query(r - 1); // count of elements < nums[i]
        Update(r);
    }
    return res;
}`,alt:""}},

{id:"l86",name:"The Skyline Problem",lcNum:"218",diff:"hard",pattern:"Line Sweep",alts:["Priority queue sweep","Segment tree"],
approach:"Convert buildings to events: (x, -height) for start, (x, height) for end. Sort events by x; at same x, starts (negative) before ends, taller before shorter. Sweep with a SortedDictionary of active heights. When max height changes, record a keypoint. O(n log n).",
followups:["Rectangle Area II (LC 850)","Employee Free Time (LC 759)","My Calendar III (LC 732)","Maximum Width Ramp (LC 962)"],
similar:["Meeting Rooms II","Merge Intervals","Rectangle Area"],
notes:"Encode start heights as negative so they sort before ends at same x. Use SortedDictionary<height, count> as a multiset for active buildings (need to handle duplicate heights). When max height changes → new keypoint.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n * maxX): scan every x-coordinate
// Too slow for large coordinates — need coordinate compression`,why:`Scanning every x-coordinate between buildings is O(maxX) which can be 2^31. Line sweep only processes the 2n boundary points — O(n log n).`,optimal:`// OPTIMAL — Line Sweep with SortedDictionary — O(n log n)
public IList<IList<int>> GetSkyline(int[][] buildings) {
    var events = new List<(int x, int h)>();
    foreach (var b in buildings) {
        events.Add((b[0], -b[2])); // start: negative height
        events.Add((b[1],  b[2])); // end:   positive
    }
    events.Sort((a,b) => a.x!=b.x ? a.x-b.x : a.h-b.h);

    var active = new SortedDictionary<int,int>(Comparer<int>.Create((a,b)=>b-a)); // max-first
    active[0] = 1;
    var res = new List<IList<int>>();
    int prevMax = 0;

    foreach (var (x, h) in events) {
        if (h < 0) active[-h] = active.GetValueOrDefault(-h) + 1;
        else { if (--active[h] == 0) active.Remove(h); }
        int curMax = active.Keys.First();
        if (curMax != prevMax) { res.Add(new[]{x, curMax}); prevMax = curMax; }
    }
    return res;
}`,alt:""}},

{id:"l87",name:"Network Delay Time",lcNum:"743",diff:"medium",pattern:"Graph Advanced",alts:["Bellman-Ford O(VE)","Floyd-Warshall O(V³)"],
approach:"Dijkstra from source node k. Build adjacency list. Use min-heap (priority queue) with (distance, node). Relax edges greedily. Skip stale entries (d > dist[node]). Answer = max of all dist values; if any unreachable → -1. O((V+E) log V).",
followups:["Cheapest Flights Within K Stops (LC 787)","Find the City With the Smallest Number of Neighbors (LC 1334)","Path With Minimum Effort (LC 1631)","Swim in Rising Water (LC 778)"],
similar:["Cheapest Flights K Stops","Path With Maximum Probability","Minimum Cost to Reach City"],
notes:"Dijkstra requires non-negative weights. Skip stale PQ entries with if(d > dist[node]) continue. For 'at most K stops' — use modified Dijkstra with state (node, stops) or Bellman-Ford K iterations.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — BFS/DFS trying all paths — exponential for graphs with cycles`,why:`Trying all paths is exponential. Dijkstra exploits non-negative weights: the first time a node is dequeued from the min-heap, its distance is guaranteed optimal — no need to revisit.`,optimal:`// OPTIMAL — Dijkstra — O((V+E) log V) time, O(V+E) space
public int NetworkDelayTime(int[][] times, int n, int k) {
    var graph = new List<(int to, int w)>[n+1];
    for (int i = 1; i <= n; i++) graph[i] = new();
    foreach (var t in times) graph[t[0]].Add((t[1], t[2]));

    int[] dist = Enumerable.Repeat(int.MaxValue, n+1).ToArray();
    dist[k] = 0;
    var pq = new PriorityQueue<(int d, int u), int>();
    pq.Enqueue((0, k), 0);

    while (pq.Count > 0) {
        var (d, u) = pq.Dequeue();
        if (d > dist[u]) continue; // stale entry
        foreach (var (v, w) in graph[u])
            if (dist[u] + w < dist[v]) {
                dist[v] = dist[u] + w;
                pq.Enqueue((dist[v], v), dist[v]);
            }
    }
    int ans = dist.Skip(1).Max();
    return ans == int.MaxValue ? -1 : ans;
}`,alt:""}},

{id:"l88",name:"Cheapest Flights Within K Stops",lcNum:"787",diff:"medium",pattern:"Graph Advanced",alts:["Bellman-Ford K iterations","Modified Dijkstra with stops state"],
approach:"Bellman-Ford with exactly K+1 iterations (K stops = K+1 edges). Each iteration relaxes all edges once. Use a copy of previous dist to avoid using edges added in the same iteration. O(K*E) time O(V) space.",
followups:["Network Delay Time (LC 743)","Path With Minimum Effort (LC 1631)","Find Cheapest Price (variant)","Minimum Cost to Reach City With Budget"],
similar:["Network Delay Time","Path With Maximum Probability","Minimum Cost Flow"],
notes:"Must use a COPY of dist from previous iteration — otherwise you might use two edges from the same iteration. This is the key difference from standard Bellman-Ford.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — DFS/BFS exploring all paths within K stops — exponential`,why:`Exploring all paths is exponential. Bellman-Ford with K iterations is O(K*E): each iteration finds the shortest path using at most one more edge. Use a snapshot of previous iteration to avoid chaining edges within one pass.`,optimal:`// OPTIMAL — Bellman-Ford K+1 iterations — O(K*E) time, O(V) space
public int FindCheapestPrice(int n, int[][] flights, int src, int dst, int k) {
    int[] dist = Enumerable.Repeat(int.MaxValue/2, n).ToArray();
    dist[src] = 0;

    for (int i = 0; i <= k; i++) {        // k stops = k+1 edges
        int[] tmp = dist.ToArray();        // snapshot — prevent chaining
        foreach (var f in flights)
            if (dist[f[0]] != int.MaxValue/2)
                tmp[f[1]] = Math.Min(tmp[f[1]], dist[f[0]] + f[2]);
        dist = tmp;
    }
    return dist[dst] == int.MaxValue/2 ? -1 : dist[dst];
}`,alt:""}},

{id:"l89",name:"Minimum Cost to Connect All Points",lcNum:"1584",diff:"medium",pattern:"Graph Advanced",alts:["Prim's MST O(V²)","Kruskal + Union-Find O(E log E)"],
approach:"Prim's algorithm: start from any node, greedily add the cheapest edge connecting the MST to a new node. Use dist[] array tracking cheapest connection for each unvisited node. Update after each node added. O(V²) with array, O(E log V) with heap.",
followups:["Network Delay Time (LC 743)","Find Critical and Pseudo-Critical Edges (LC 1489)","Connecting Cities With Minimum Cost (LC 1135)","Optimize Water Distribution (LC 1168)"],
similar:["Network Delay Time","Cheapest Flights","Redundant Connection"],
notes:"For dense graphs (V² edges like this problem), Prim's with a dist array is O(V²) which is better than Kruskal's O(E log E) = O(V² log V). Manhattan distance: |x1-x2| + |y1-y2|.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — Generate all edges, sort, use Kruskal — O(V² log V)
// For V=1000 this is 10^6 edges — acceptable but Prim's is cleaner`,why:`Kruskal generates all V² edges explicitly then sorts. Prim's avoids materializing all edges by computing distances on-the-fly as we extend the MST — O(V²) for dense graphs.`,optimal:`// OPTIMAL — Prim's MST — O(V²) time, O(V) space
public int MinCostConnectPoints(int[][] points) {
    int n = points.Length;
    int[] minDist = Enumerable.Repeat(int.MaxValue, n).ToArray();
    bool[] visited = new bool[n];
    minDist[0] = 0;
    int totalCost = 0;

    for (int i = 0; i < n; i++) {
        // pick unvisited node with minimum distance
        int u = -1;
        for (int j = 0; j < n; j++)
            if (!visited[j] && (u == -1 || minDist[j] < minDist[u])) u = j;
        visited[u] = true;
        totalCost += minDist[u];
        // update distances to unvisited nodes
        for (int v = 0; v < n; v++)
            if (!visited[v]) {
                int d = Math.Abs(points[u][0]-points[v][0]) + Math.Abs(points[u][1]-points[v][1]);
                minDist[v] = Math.Min(minDist[v], d);
            }
    }
    return totalCost;
}`,alt:""}},

{id:"l90",name:"Find Median from Data Stream",lcNum:"295",diff:"hard",pattern:"Two Heaps / Sliding Window Median",alts:["Sorted array O(n) insert","Order statistics tree"],
approach:"Max-heap (lower half) + min-heap (upper half). Always add to lo first, then push lo.top to hi. If hi becomes larger, push hi.top back to lo. Median: if sizes equal → average of tops; else → top of larger heap. O(log n) add, O(1) median.",
followups:["Sliding Window Median (LC 480)","IPO (LC 502)","Find Right Interval (LC 436)","Kth Largest in Stream (LC 703)"],
similar:["Kth Largest Element","Top K Frequent Elements","Task Scheduler"],
notes:"In C#, PriorityQueue is a min-heap. Simulate max-heap by negating priorities: Enqueue(val, -val). The invariant: lo.Count >= hi.Count and lo.Max <= hi.Min at all times.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — maintain sorted list, median is middle element
// O(n) insert due to shifting, O(1) median
// Too slow for many inserts`,why:`Sorted list insert is O(n). Two heaps maintain a partition at the median — each insert costs O(log n) to fix the heap, median is always at the tops.`,optimal:`// OPTIMAL — Two Heaps — O(log n) add, O(1) median
public class MedianFinder {
    PriorityQueue<int,int> lo = new(); // max-heap: (val, -val)
    PriorityQueue<int,int> hi = new(); // min-heap: (val,  val)

    public void AddNum(int num) {
        lo.Enqueue(num, -num);
        // Balance: push lo's max to hi
        int top = lo.Dequeue();
        hi.Enqueue(top, top);
        // Ensure lo.Count >= hi.Count
        if (hi.Count > lo.Count) {
            int v = hi.Dequeue();
            lo.Enqueue(v, -v);
        }
    }
    public double FindMedian() =>
        lo.Count > hi.Count ? lo.Peek() : (lo.Peek() + hi.Peek()) / 2.0;
}`,alt:""}},

{id:"l91",name:"Sliding Window Median",lcNum:"480",diff:"hard",pattern:"Two Heaps / Sliding Window Median",alts:["Two SortedSets + lazy deletion","Segment tree on values"],
approach:"Two SortedSets (multisets) acting as max-half (lo) and min-half (hi). Slide window: add new element, remove outgoing element using lazy deletion. Rebalance after each operation. Median from tops. O(n log k).",

similar:["Find Median from Data Stream","Kth Largest Element","Range Sum Query Mutable"],
notes:"Lazy deletion: mark removed elements in a HashMap, skip them when they reach the top of the heap. SortedSet doesn't allow duplicates — use (value, index) pairs to differentiate.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n*k): sort each window of size k
public double[] MedianSlidingWindowBrute(int[] nums, int k) {
    var res = new double[nums.Length - k + 1];
    for (int i = 0; i <= nums.Length - k; i++) {
        var win = nums.Skip(i).Take(k).OrderBy(x=>x).ToArray();
        res[i] = k%2==1 ? win[k/2] : (win[k/2-1]+(double)win[k/2])/2;
    }
    return res;
}`,why:`Sorting each window is O(k log k) per slide = O(nk log k) total. Two sorted multisets maintain the median partition dynamically — O(log k) per add/remove.`,optimal:`// OPTIMAL — Two SortedSets with (val,idx) pairs — O(n log k)
public double[] MedianSlidingWindow(int[] nums, int k) {
    // Use SortedSet<(int val, int idx)> as ordered multiset
    var lo = new SortedSet<(int v,int i)>(Comparer<(int v,int i)>.Create((a,b)=>a.v!=b.v?b.v-a.v:b.i-a.i)); // max-first
    var hi = new SortedSet<(int v,int i)>(Comparer<(int v,int i)>.Create((a,b)=>a.v!=b.v?a.v-b.v:a.i-b.i)); // min-first

    Action<(int,int),bool> add = (item, toLo) => {
        if (toLo) lo.Add(item); else hi.Add(item);
        if (lo.Count > 0 && hi.Count > 0 && lo.Min.v > hi.Min.v) {
            var t=lo.Min; lo.Remove(t); hi.Add(t);
        }
        while (lo.Count > (k+1)/2) { var t=lo.Min; lo.Remove(t); hi.Add(t); }
        while (hi.Count > k/2)     { var t=hi.Min; hi.Remove(t); lo.Add(t); }
    };

    double[] res = new double[nums.Length-k+1];
    for (int i=0;i<k;i++) add((nums[i],i),true);
    for (int i=0;i<=nums.Length-k;i++) {
        res[i] = k%2==1 ? lo.Min.v : (lo.Min.v+(double)hi.Min.v)/2.0;
        if (i+k<nums.Length) {
            add((nums[i+k],i+k),true);
            var rem=(nums[i],i);
            if (!lo.Remove(rem)) hi.Remove(rem);
            while (lo.Count<(k+1)/2){var t=hi.Min;hi.Remove(t);lo.Add(t);}
            while (hi.Count>k/2)   {var t=lo.Min;lo.Remove(t);hi.Add(t);}
        }
    }
    return res;
}`,alt:""}},

{id:"l92",name:"Two Sum",lcNum:"1",diff:"easy",pattern:"Hash Map / Counting",alts:["Sorting + two pointers O(n log n)","Brute force O(n²)"],
approach:"One-pass HashMap. For each num, check if complement (target - num) is already in map. If yes → return indices. If no → store num → index in map. O(n) time O(n) space.",

similar:["Three Sum","Four Sum","Subarray Sum Equals K"],
notes:"Classic HashMap pattern. Return indices not values (unlike Two Sum II which returns 1-indexed positions). Store num→index (not index→num) so lookup is by value. Single pass: check complement BEFORE inserting current.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n²) time, O(1) space
public int[] TwoSumBrute(int[] nums, int target) {
    for (int i = 0; i < nums.Length; i++)
        for (int j = i+1; j < nums.Length; j++)
            if (nums[i] + nums[j] == target) return new[]{i, j};
    return new[]{-1,-1};
}`,why:`Checking all pairs is O(n²). HashMap enables O(1) complement lookup: we don't need to scan backwards — just check if target-current is already seen.`,optimal:`// OPTIMAL — HashMap one pass — O(n) time, O(n) space
public int[] TwoSum(int[] nums, int target) {
    var seen = new Dictionary<int,int>(); // value → index
    for (int i = 0; i < nums.Length; i++) {
        int comp = target - nums[i];
        if (seen.TryGetValue(comp, out int j))
            return new[]{j, i};
        seen[nums[i]] = i;
    }
    return new[]{-1,-1};
}`,alt:""}},

{id:"l94",name:"Longest Consecutive Sequence",lcNum:"128",diff:"medium",pattern:"Hash Map / Counting",alts:["Sort O(n log n)","Union-Find"],
approach:"Put all numbers in a HashSet. For each number, only start counting if num-1 is NOT in the set (it's the start of a sequence). Count upward as long as num+1 exists. O(n) time O(n) space. Each element visited at most twice.",

notes:"The 'only start from sequence head' trick is critical — otherwise O(n²). A number is a sequence head if num-1 is not in the set. Each number is counted as part of exactly one sequence.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n log n): sort then count consecutive runs
public int LongestConsecutiveBrute(int[] nums) {
    if (nums.Length == 0) return 0;
    Array.Sort(nums);
    int max = 1, cur = 1;
    for (int i = 1; i < nums.Length; i++) {
        if (nums[i] == nums[i-1]) continue; // skip dups
        cur = nums[i] == nums[i-1]+1 ? cur+1 : 1;
        max = Math.Max(max, cur);
    }
    return max;
}`,why:`Sorting is O(n log n). HashSet approach is O(n): by only starting a count when we're at the beginning of a sequence (num-1 not present), we ensure each element is visited at most twice total.`,optimal:`// OPTIMAL — HashSet + start detection — O(n) time, O(n) space
public int LongestConsecutive(int[] nums) {
    var set = new HashSet<int>(nums);
    int maxLen = 0;
    foreach (int n in set) {
        if (set.Contains(n - 1)) continue; // not a sequence start
        int len = 1;
        while (set.Contains(n + len)) len++;
        maxLen = Math.Max(maxLen, len);
    }
    return maxLen;
}`,alt:""}},

solution:{brute:`// No meaningful brute force — stack IS the optimal solution for this problem`,why:`Stack directly models the LIFO nature of bracket matching: the most recently opened bracket must be closed first. No other approach beats O(n) for this problem.`,optimal:`// OPTIMAL — Stack — O(n) time, O(n) space
public bool IsValid(string s) {
    var stack = new Stack<char>();
    var match = new Dictionary<char,char> {{')','('},{']','['},{'}','{'}};

    foreach (char c in s) {
        if (c=='('||c=='['||c=='{') stack.Push(c);
        else {
            if (stack.Count == 0 || stack.Pop() != match[c])
                return false;
        }
    }
    return stack.Count == 0;
}`,alt:""}},

{id:"l97",name:"Reverse Linked List",lcNum:"206",diff:"easy",pattern:"Linked List",alts:["Recursive","Stack (O(n) space)"],
approach:"Iterative three-pointer: prev=null, cur=head. At each step: save next=cur.next, set cur.next=prev, advance prev=cur, cur=next. Return prev when cur is null. O(n) time O(1) space.",
followups:["Reverse Linked List II (LC 92) — reverse sublist","Reverse Nodes in k-Group (LC 25)","Palindrome Linked List (LC 234)","Reorder List (LC 143)"],
similar:["Reverse Linked List II","Palindrome Linked List","Merge Two Sorted Lists"],
notes:"Three variables: prev (new head grows here), cur (current node), next (saved before overwriting cur.next). Recursive version: reverse(head.next), then head.next.next = head, head.next = null.",date:"2026-03-15",
solution:{brute:`// No brute force needed — iterative IS the optimal approach`,why:`Reversing a linked list requires touching every node exactly once — O(n) is optimal. The challenge is doing it in-place with O(1) space using the three-pointer technique.`,optimal:`// OPTIMAL — Iterative three-pointer — O(n) time, O(1) space
public ListNode ReverseList(ListNode head) {
    ListNode prev = null, cur = head;
    while (cur != null) {
        ListNode next = cur.next; // save
        cur.next = prev;          // reverse
        prev = cur;               // advance
        cur = next;
    }
    return prev; // new head
}`,alt:`// ALTERNATE — Recursive — O(n) time, O(n) space (call stack)
public ListNode ReverseListRec(ListNode head) {
    if (head == null || head.next == null) return head;
    ListNode newHead = ReverseListRec(head.next);
    head.next.next = head;
    head.next = null;
    return newHead;
}`}},

{id:"l98",name:"Merge Two Sorted Lists",lcNum:"21",diff:"easy",pattern:"Linked List",alts:["Recursive","Collect to arrays"],
approach:"Dummy head node + iterative merge. Compare l1.val and l2.val, append the smaller to result, advance that pointer. When one list exhausted, append the other. Return dummy.next. O(n+m) time O(1) space.",
followups:["Merge K Sorted Lists (LC 23)","Sort List (LC 148)","Merge Sorted Array (LC 88)","Intersection of Two Linked Lists (LC 160)"],
similar:["Merge K Sorted Lists","Sort List","Merge Intervals"],
notes:"Dummy head eliminates special case for inserting into empty result list. After the while loop, one list may still have remaining nodes — cur.next = l1 ?? l2 handles both cases.",date:"2026-03-15",
solution:{brute:`// No simpler brute force — merge is inherently O(n+m) since we must read every node`,why:`We must examine every node to produce sorted output — O(n+m) is optimal. Dummy head simplifies the code by removing the 'empty result' edge case.`,optimal:`// OPTIMAL — Iterative with dummy head — O(n+m) time, O(1) space
public ListNode MergeTwoLists(ListNode l1, ListNode l2) {
    var dummy = new ListNode(0);
    var cur = dummy;

    while (l1 != null && l2 != null) {
        if (l1.val <= l2.val) { cur.next = l1; l1 = l1.next; }
        else                  { cur.next = l2; l2 = l2.next; }
        cur = cur.next;
    }
    cur.next = l1 ?? l2; // attach remaining
    return dummy.next;
}`,alt:`// ALTERNATE — Recursive — O(n+m) time, O(n+m) space (call stack)
public ListNode MergeTwoListsRec(ListNode l1, ListNode l2) {
    if (l1 == null) return l2;
    if (l2 == null) return l1;
    if (l1.val <= l2.val) { l1.next = MergeTwoListsRec(l1.next, l2); return l1; }
    else                  { l2.next = MergeTwoListsRec(l1, l2.next); return l2; }
}`}},

{id:"l99",name:"LRU Cache",lcNum:"146",diff:"medium",pattern:"Linked List",alts:["OrderedDictionary (C#)","SortedDictionary with timestamp"],
approach:"Dictionary<int, LinkedListNode> + DoublyLinkedList. Get: move node to front. Put: if exists update+move to front; if new add to front, evict tail if over capacity. All O(1). Dummy head and tail simplify list manipulation.",
followups:["LFU Cache (LC 460)","Design HashMap (LC 706)","Design Hashset (LC 705)","All O(1) Data Structure (LC 432)"],
similar:["Design HashMap","Design Hashset","Implement Stack using Queues"],
notes:"LinkedList in C# is doubly-linked. Store LinkedListNode in dictionary for O(1) node access. Dummy sentinels (head and tail) avoid null checks on remove/insert. C# OrderedDictionary is simpler but less instructive.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — List<KeyValuePair> — O(n) get/put due to linear search`,why:`Linear search is O(n). HashMap gives O(1) lookup; doubly linked list gives O(1) move-to-front and eviction by maintaining insertion order with O(1) node re-linking.`,optimal:`// OPTIMAL — HashMap + Doubly Linked List — O(1) get/put
public class LRUCache {
    int capacity;
    Dictionary<int, LinkedListNode<(int k, int v)>> map = new();
    LinkedList<(int k, int v)> list = new();

    public LRUCache(int capacity) { this.capacity = capacity; }

    public int Get(int key) {
        if (!map.ContainsKey(key)) return -1;
        var node = map[key];
        list.Remove(node); list.AddFirst(node.Value); // move to front
        map[key] = list.First;
        return node.Value.v;
    }
    public void Put(int key, int value) {
        if (map.ContainsKey(key)) list.Remove(map[key]);
        list.AddFirst((key, value));
        map[key] = list.First;
        if (map.Count > capacity) {
            map.Remove(list.Last.Value.k);
            list.RemoveLast();
        }
    }
}`,alt:""}},

{id:"l100",name:"Count Primes",lcNum:"204",diff:"medium",pattern:"Math & Number Theory",alts:["Trial division O(n√n)","Segmented sieve"],
approach:"Sieve of Eratosthenes. Boolean array isPrime[n+1], initially all true. For each i from 2 to √n: if isPrime[i], mark all multiples of i starting from i² as false. Count remaining trues from 2 to n-1. O(n log log n) time O(n) space.",
followups:["Prime Arrangements (LC 1175)","Ugly Number II (LC 264)","Super Ugly Number (LC 313)","Nth Magical Number (LC 878)"],
similar:["Happy Number","Perfect Squares","Ugly Number"],
notes:"Start marking from i² (not 2i) because smaller multiples already marked. Only iterate i up to √n. Sieve is O(n log log n) — nearly linear. For very large n use segmented sieve.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n√n): check each number for primality individually
public int CountPrimesBrute(int n) {
    int count = 0;
    for (int i = 2; i < n; i++) {
        bool prime = true;
        for (int j = 2; j * j <= i; j++)
            if (i % j == 0) { prime = false; break; }
        if (prime) count++;
    }
    return count;
}`,why:`Individual primality tests are O(√n) each — O(n√n) total. Sieve marks composites in bulk: when we find a prime p, all its multiples are composite. Much faster at O(n log log n).`,optimal:`// OPTIMAL — Sieve of Eratosthenes — O(n log log n) time, O(n) space
public int CountPrimes(int n) {
    if (n < 2) return 0;
    bool[] notPrime = new bool[n];
    for (int i = 2; (long)i * i < n; i++)
        if (!notPrime[i])
            for (int j = i * i; j < n; j += i)
                notPrime[j] = true;
    int count = 0;
    for (int i = 2; i < n; i++) if (!notPrime[i]) count++;
    return count;
}`,alt:""}},

{id:"l101",name:"Pow(x, n)",lcNum:"50",diff:"medium",pattern:"Math & Number Theory",alts:["Iterative binary exponentiation","Recursive fast pow"],
approach:"Binary exponentiation (fast pow). If n is even: x^n = (x²)^(n/2). If n is odd: x^n = x * x^(n-1). Recursively halve n. Handle negative n: x^(-n) = (1/x)^n. O(log n) time O(log n) stack space. Iterative version O(1) space.",
followups:["Sqrt(x) (LC 69) — binary search on answer","Super Pow (LC 372) — modular exponentiation","Matrix Exponentiation","Fibonacci in O(log n) via matrix pow"],
similar:["Sqrt(x)","Count Primes","Integer Break"],
notes:"Watch for n = INT_MIN: -INT_MIN overflows. Cast to long first. Iterative: while n>0, if n is odd multiply result by x, then x=x*x, n>>=1.",date:"2026-03-15",
solution:{brute:`// BRUTE FORCE — O(n): multiply x n times
public double MyPowBrute(double x, int n) {
    double res = 1;
    long N = Math.Abs((long)n);
    for (long i = 0; i < N; i++) res *= x;
    return n < 0 ? 1.0/res : res;
}`,why:`O(n) multiplications is too slow for large n (up to 2^31). Binary exponentiation halves the problem each step: x^n = (x^(n/2))^2, reducing to O(log n) multiplications.`,optimal:`// OPTIMAL — Fast Power (iterative) — O(log n) time, O(1) space
public double MyPow(double x, int n) {
    long N = n; // handle INT_MIN
    if (N < 0) { x = 1.0 / x; N = -N; }
    double result = 1.0;
    while (N > 0) {
        if ((N & 1) == 1) result *= x; // odd: take one factor
        x *= x;                         // square the base
        N >>= 1;                        // halve the exponent
    }
    return result;
}`,alt:""}}

const pickRandom=(patFilter,inclMain,inclFollowups)=>{
  let pool=[];
  P.forEach(p=>{
    const active=patFilter.length===0||patFilter.includes(p.name);
    if(!active)return;
    if(inclMain&&p.problems){p.problems.forEach(name=>pool.push({name,pattern:p.name,source:"pattern",color:p.color,border:p.border,emoji:p.emoji}));}
  });
  if(inclFollowups){
    log.forEach(e=>{
      const active=patFilter.length===0||patFilter.includes(e.pattern);
      if(!active)return;
      (e.followups||[]).forEach(f=>pool.push({name:f,pattern:e.pattern,source:"followup",parentProblem:e.name,color:(P.find(x=>x.name===e.pattern)||{color:"#58A6FF"}).color,border:(P.find(x=>x.name===e.pattern)||{border:"#58A6FF40"}).border,emoji:(P.find(x=>x.name===e.pattern)||{emoji:"📌"}).emoji}));
    });
  }
  if(pool.length===0)return null;
  return pool[Math.floor(Math.random()*pool.length)];
};

const importData=(e)=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const payload=JSON.parse(ev.target.result);
      if(payload.dsa_problem_log_v2){saveLog(payload.dsa_problem_log_v2);}
      if(payload.dsa_prob_status){setProblemStatus(payload.dsa_prob_status);localStorage.setItem("dsa_prob_status",JSON.stringify(payload.dsa_prob_status));}
      if(payload.dsa_followup_status){saveFollowupStatus(payload.dsa_followup_status);}
      if(payload.dsa_user_notes){saveUserNotes(payload.dsa_user_notes);}
      if(payload.dsa_fam_done){saveFamDone(payload.dsa_fam_done);}
      if(payload.dsa_fam_pat_done){saveFamPatDone(payload.dsa_fam_pat_done);}
      if(payload.dsa_progress){save(payload.dsa_progress);}
      alert("✅ Data imported successfully!");
    }catch(err){alert("❌ Invalid backup file.");}
  };
  reader.readAsText(file);
  e.target.value="";
};

        </div>
        <button onClick={()=>copyCode(copyKey,code)} style={{background:copiedSol===copyKey?"#56D36420":"#161B22",border:`1px solid ${copiedSol===copyKey?"#56D364":"#30363D"}`,color:copiedSol===copyKey?"#56D364":"#8B949E",padding:"2px 8px",borderRadius:3,cursor:"pointer",fontSize:9,fontFamily:"inherit"}}>
          {copiedSol===copyKey?"✓ Copied":"Copy"}
        </button>
      </div>
      <pre style={{background:"#010409",border:"1px solid #30363D",borderRadius:"0 0 6px 6px",padding:"11px 13px",overflowX:"auto",fontSize:10,lineHeight:1.7,color:"#C9D1D9",margin:0,whiteSpace:"pre"}}>
        {code.split("\n").map((line,i)=>(
          <div key={i} dangerouslySetInnerHTML={{__html:hlFn(line)}}/>
        ))}
      </pre>
    </div>
  );
  return(
    <div>
      <CodeBlock label="BRUTE FORCE" labelColor="#FF7B72" code={sol.brute} copyKey={id+"_b"}/>
      {sol.why&&(
        <div style={{background:"#0F2A1A",border:"1px solid #238636",borderRadius:6,padding:"9px 12px",marginBottom:10,borderLeft:"3px solid #56D364"}}>
          <div style={{fontSize:9,color:"#56D364",fontWeight:700,letterSpacing:1,marginBottom:4}}>💡 WHY THIS PATTERN?</div>
          <div style={{fontSize:11,color:"#C9D1D9",lineHeight:1.8}}>{sol.why}</div>
        </div>
      )}
      <CodeBlock label="OPTIMAL SOLUTION" labelColor="#56D364" code={sol.optimal} copyKey={id+"_o"}/>
      {sol.alt&&<CodeBlock label="ALTERNATE APPROACH" labelColor="#FFD700" code={sol.alt} copyKey={id+"_a"}/>}
    </div>
  );
}
