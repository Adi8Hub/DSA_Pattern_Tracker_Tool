{id:1,name:"Sliding Window",emoji:"🪟",rank:"⭐ Most Common",color:"#00D4FF",bg:"#00D4FF15",border:"#00D4FF40",tc:"O(n)",sc:"O(1) or O(k)",
identify:["Contiguous subarray/substring","Max/min/avg of subarray of size k","Longest/shortest subarray satisfying condition","Keywords: 'window', 'contiguous', 'substring', 'subarray'"],
whenToUse:"Use when the problem involves a linear data structure and you need to find a contiguous range satisfying some condition. Works when brute force is O(n²) or O(n³).",
types:["Fixed Size Window","Variable Size Window (Expand/Shrink)"],
template:`// Fixed window of size k
int FixedWindow(int[] arr, int k) {
    int windowSum = 0, maxSum = 0;
    for (int i = 0; i < k; i++) windowSum += arr[i];
    maxSum = windowSum;
    for (int i = k; i < arr.Length; i++) {
        windowSum += arr[i] - arr[i - k]; // slide
        maxSum = Math.Max(maxSum, windowSum);
    }
    return maxSum;
}

// Variable window (longest substring with k distinct)
int VariableWindow(string s, int k) {
    int left = 0, maxLen = 0;
    var freq = new Dictionary<char, int>();
    for (int right = 0; right < s.Length; right++) {
        freq[s[right]] = freq.GetValueOrDefault(s[right]) + 1;
        while (freq.Count > k) { // shrink
            freq[s[left]]--;
            if (freq[s[left]] == 0) freq.Remove(s[left]);
            left++;
        }
        maxLen = Math.Max(maxLen, right - left + 1);
    }
    return maxLen;
}`,

trick:"When window becomes invalid → shrink from left. When valid → expand from right."},

{id:2,name:"Two Pointers",emoji:"👆",rank:"⭐ Most Common",color:"#FF6B6B",bg:"#FF6B6B15",border:"#FF6B6B40",tc:"O(n)",sc:"O(1)",
identify:["Sorted array or can be sorted","Finding pairs/triplets with target sum","Palindrome checks","Keywords: 'pair', 'sorted', 'in-place', 'reverse'"],
whenToUse:"Use when dealing with sorted arrays/strings to find a pair, or when iterating from both ends reduces O(n²) to O(n). Also great for partitioning.",
types:["Opposite Direction (left & right)","Same Direction (fast & slow)","Multiple Arrays"],
template:`// Two Sum in sorted array
int[] TwoSum(int[] arr, int target) {
    int left = 0, right = arr.Length - 1;
    while (left < right) {
        int sum = arr[left] + arr[right];
        if (sum == target) return new[] { left, right };
        else if (sum < target) left++;
        else right--;
    }
    return new[] { -1, -1 };
}

// Remove duplicates (same direction)
int RemoveDups(int[] arr) {
    int slow = 0;
    for (int fast = 1; fast < arr.Length; fast++)
        if (arr[fast] != arr[slow]) arr[++slow] = arr[fast];
    return slow + 1;
}

// Three Sum
IList<IList<int>> ThreeSum(int[] nums) {
    Array.Sort(nums);
    var result = new List<IList<int>>();
    for (int i = 0; i < nums.Length - 2; i++) {
        if (i > 0 && nums[i] == nums[i - 1]) continue;
        int l = i + 1, r = nums.Length - 1;
        while (l < r) {
            int sum = nums[i] + nums[l] + nums[r];
            if (sum == 0) { result.Add(new[]{nums[i],nums[l],nums[r]}); l++; r--; }
            else if (sum < 0) l++; else r--;
        }
    }
    return result;
}`,

trick:"Always sort first if order doesn't matter. Skip duplicates after finding a match."},

{id:3,name:"Fast & Slow Pointers",emoji:"🐢🐇",rank:"⭐ Common",color:"#A8FF78",bg:"#A8FF7815",border:"#A8FF7840",tc:"O(n)",sc:"O(1)",

whenToUse:"Use with linked lists to detect cycles, find middle nodes, or detect where a cycle starts. Floyd's algorithm is the classic implementation.",
types:["Cycle Detection","Find Middle","Find Cycle Start"],
template:`// Detect cycle (Floyd's)
bool HasCycle(ListNode head) {
    var slow = head; var fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next; fast = fast.next.next;
        if (slow == fast) return true;
    }
    return false;
}

// Find cycle start
ListNode DetectCycle(ListNode head) {
    var slow = head; var fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next; fast = fast.next.next;
        if (slow == fast) {
            slow = head; // reset
            while (slow != fast) { slow = slow.next; fast = fast.next; }
            return slow; // cycle start
        }
    }
    return null;
}

// Find middle
ListNode FindMiddle(ListNode head) {
    var slow = head; var fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next; fast = fast.next.next;
    }
    return slow;
}`,

template:`// Classic binary search
int BinarySearch(int[] arr, int target) {
    int lo = 0, hi = arr.Length - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2; // avoid overflow
        if (arr[mid] == target) return mid;
        else if (arr[mid] < target) lo = mid + 1;
        else hi = mid - 1;
    }
    return -1;
}

// Search on Answer (minimize max / maximize min)
int SearchOnAnswer(int[] arr, int m) {
    int lo = 1, hi = arr.Max(), ans = -1;
    bool Feasible(int mid) { return true; /* define condition */ }
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (Feasible(mid)) { ans = mid; hi = mid - 1; }
        else lo = mid + 1;
    }
    return ans;
}

// Rotated sorted array
int SearchRotated(int[] nums, int target) {
    int lo = 0, hi = nums.Length - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (nums[mid] == target) return mid;
        if (nums[lo] <= nums[mid]) {
            if (nums[lo] <= target && target < nums[mid]) hi = mid - 1;
            else lo = mid + 1;
        } else {
            if (nums[mid] < target && target <= nums[hi]) lo = mid + 1;
            else hi = mid - 1;
        }
    }
    return -1;
}`,

{id:5,name:"BFS",emoji:"🌊",rank:"⭐ Most Common",color:"#FF9F43",bg:"#FF9F4315",border:"#FF9F4340",tc:"O(V + E)",sc:"O(V)",
identify:["Shortest path in unweighted graph","Level-order traversal","Keywords: 'shortest', 'minimum steps', 'level', 'nearest'","State-space search (word ladder, sliding puzzle)"],
whenToUse:"Use BFS when you need shortest path in an unweighted graph, level-by-level processing, or 'how many steps to reach'. BFS guarantees shortest path.",
types:["Graph BFS","Tree Level Order","Multi-source BFS","0-1 BFS"],
template:`// Standard BFS (shortest path)
int Bfs(List<List<int>> graph, int start, int end) {
    var queue = new Queue<(int node, int dist)>();
    var visited = new HashSet<int> { start };
    queue.Enqueue((start, 0));
    while (queue.Count > 0) {
        var (node, dist) = queue.Dequeue();
        if (node == end) return dist;
        foreach (int nb in graph[node])
            if (visited.Add(nb)) queue.Enqueue((nb, dist + 1));
    }
    return -1;
}

// Multi-source BFS
int[][] MultiSourceBFS(int[][] grid) {
    int R = grid.Length, C = grid[0].Length;
    var dist = new int[R][];
    for (int i = 0; i < R; i++) { dist[i] = new int[C]; Array.Fill(dist[i], int.MaxValue); }
    var q = new Queue<(int r, int c)>();
    for (int i=0;i<R;i++) for(int j=0;j<C;j++)
        if (grid[i][j]==0) { dist[i][j]=0; q.Enqueue((i,j)); }
    int[][] dirs={{0,1},{0,-1},{1,0},{-1,0}};
    while (q.Count>0) {
        var (r,c)=q.Dequeue();
        foreach(var d in dirs) {
            int nr=r+d[0], nc=c+d[1];
            if(nr>=0&&nr<R&&nc>=0&&nc<C&&dist[nr][nc]>dist[r][c]+1) {
                dist[nr][nc]=dist[r][c]+1; q.Enqueue((nr,nc));
            }
        }
    }
    return dist;
}`,
pairs:["HashSet (visited)","DFS (when path doesn't matter)","Dijkstra (weighted graphs)"],
problems:["Binary Tree Level Order","Word Ladder","Rotting Oranges","Shortest Path in Binary Matrix","Number of Islands"],
trick:"Always mark visited BEFORE adding to queue (not after dequeue) to avoid duplicates."},

{id:6,name:"DFS",emoji:"🌲",rank:"⭐ Most Common",color:"#6C5CE7",bg:"#6C5CE715",border:"#6C5CE740",tc:"O(V + E)",sc:"O(H) — height",
identify:["All paths / combinations / permutations","Connected components","Cycle detection in directed graphs","Keywords: 'all possible', 'paths', 'combinations', 'islands'"],
whenToUse:"Use DFS for exploring all paths, backtracking, topological sort, and detecting cycles. Better than BFS for problems requiring full exploration.",
types:["Tree DFS","Graph DFS","Backtracking DFS","Topological Sort"],
template:`// Graph DFS (iterative)
void Dfs(List<List<int>> graph, int start) {
    var stack = new Stack<int>();
    var visited = new HashSet<int> { start };
    stack.Push(start);
    while (stack.Count > 0) {
        int node = stack.Pop();
        foreach (int nb in graph[node])
            if (visited.Add(nb)) stack.Push(nb);
    }
}

// Backtracking DFS (all subsets)
IList<IList<int>> Subsets(int[] nums) {
    var result = new List<IList<int>>();
    void Bt(int start, List<int> curr) {
        result.Add(new List<int>(curr));
        for (int i = start; i < nums.Length; i++) {
            curr.Add(nums[i]);
            Bt(i + 1, curr);
            curr.RemoveAt(curr.Count - 1); // undo
        }
    }
    Bt(0, new List<int>());
    return result;
}

// DFS on grid (number of islands)
int NumIslands(char[][] grid) {
    int count = 0;
    void Dfs(int r, int c) {
        if (r<0||r>=grid.Length||c<0||c>=grid[0].Length||grid[r][c]!='1') return;
        grid[r][c]='0';
        Dfs(r+1,c); Dfs(r-1,c); Dfs(r,c+1); Dfs(r,c-1);
    }
    for(int r=0;r<grid.Length;r++) for(int c=0;c<grid[0].Length;c++)
        if(grid[r][c]=='1') { Dfs(r,c); count++; }
    return count;
}`,
pairs:["Backtracking","Memoization (→ DP)","Union-Find (alternative for components)"],
problems:["Number of Islands","Pacific Atlantic Water Flow","Word Search","Course Schedule","All Paths from Source to Target"],
trick:"DFS = recursive call + base case + undo for backtracking. Mark visited before recursing, unmark after."},

{id:7,name:"Dynamic Programming",emoji:"🧮",rank:"⭐ Most Common",color:"#FD79A8",bg:"#FD79A815",border:"#FD79A840",tc:"O(n²) or O(n·m)",sc:"O(n) optimized",

whenToUse:"Use when a recursive solution has overlapping subproblems. DP = memoization (top-down) or tabulation (bottom-up). Start with recursion, add memo, then convert to tabulation.",
types:["1D DP (linear)","2D DP (grid/string)","Interval DP","Knapsack","State Machine DP"],
template:`// 1D DP: Coin Change
int CoinChange(int[] coins, int amount) {
    var dp = new int[amount + 1];
    Array.Fill(dp, int.MaxValue);
    dp[0] = 0;
    for (int i = 1; i <= amount; i++)
        foreach (int coin in coins)
            if (coin <= i && dp[i-coin] != int.MaxValue)
                dp[i] = Math.Min(dp[i], dp[i-coin] + 1);
    return dp[amount] == int.MaxValue ? -1 : dp[amount];
}

// 2D DP: Longest Common Subsequence
int LCS(string s1, string s2) {
    int m = s1.Length, n = s2.Length;
    var dp = new int[m+1, n+1];
    for (int i = 1; i <= m; i++)
        for (int j = 1; j <= n; j++)
            dp[i,j] = s1[i-1]==s2[j-1] ? dp[i-1,j-1]+1 : Math.Max(dp[i-1,j],dp[i,j-1]);
    return dp[m, n];
}

// Knapsack (0/1)
int Knapsack(int[] w, int[] v, int W) {
    int n = w.Length;
    var dp = new int[n+1, W+1];
    for (int i=1;i<=n;i++) for (int j=0;j<=W;j++) {
        dp[i,j] = dp[i-1,j];
        if (w[i-1]<=j) dp[i,j] = Math.Max(dp[i,j], dp[i-1,j-w[i-1]]+v[i-1]);
    }
    return dp[n, W];
}`,
pairs:["Memoization (top-down DFS)","Binary Search (LIS optimization)","Greedy (when DP not needed)"],
problems:["Climbing Stairs","Coin Change","Longest Increasing Subsequence","Edit Distance","House Robber","Word Break","Unique Paths"],
trick:"Define dp[i] clearly. Find recurrence relation. Initialize base cases. Build bottom-up. Optimize space by rolling array."},

{id:8,name:"Backtracking",emoji:"↩️",rank:"⭐ Common",color:"#FDCB6E",bg:"#FDCB6E15",border:"#FDCB6E40",tc:"O(n! or 2ⁿ)",sc:"O(n) — recursion stack",
identify:["Generate all combinations/permutations/subsets","Constraint satisfaction (N-Queens, Sudoku)","Keywords: 'all possible', 'generate', 'find all'","Need to try all options and undo if invalid"],
whenToUse:"Use when you need to explore all possibilities with constraints. The key: make a choice → explore → undo. Add pruning to avoid invalid branches early.",
types:["Subsets","Permutations","Combinations","Constraint Satisfaction"],
template:`// Template: Choose → Explore → Unchoose
void Backtrack(List<List<int>> result, List<int> curr, int[] opts, int start) {
    if (/* base case */) { result.Add(new List<int>(curr)); return; }
    for (int i = start; i < opts.Length; i++) {
        if (/* pruning */) continue;
        curr.Add(opts[i]);
        Backtrack(result, curr, opts, i+1);
        curr.RemoveAt(curr.Count - 1);
    }
}

// Permutations
IList<IList<int>> Permutations(int[] nums) {
    var result = new List<IList<int>>();
    var used = new bool[nums.Length];
    void Bt(List<int> curr) {
        if (curr.Count == nums.Length) { result.Add(new List<int>(curr)); return; }
        for (int i=0;i<nums.Length;i++) {
            if (used[i]) continue;
            used[i]=true; curr.Add(nums[i]);
            Bt(curr);
            used[i]=false; curr.RemoveAt(curr.Count-1);
        }
    }
    Bt(new List<int>());
    return result;
}

// Combination Sum (reuse allowed)
IList<IList<int>> CombinationSum(int[] candidates, int target) {
    Array.Sort(candidates);
    var result = new List<IList<int>>();
    void Bt(int start, List<int> curr, int rem) {
        if (rem==0) { result.Add(new List<int>(curr)); return; }
        for (int i=start;i<candidates.Length;i++) {
            if (candidates[i]>rem) break; // pruning
            curr.Add(candidates[i]);
            Bt(i, curr, rem-candidates[i]);
            curr.RemoveAt(curr.Count-1);
        }
    }
    Bt(0, new List<int>(), target);
    return result;
}`,

trick:"Sort first to enable early pruning. Skip duplicates: if(i > start && nums[i] == nums[i-1]) continue."},

template:`// C# PriorityQueue<TElement, TPriority> (.NET 6+)
// Lower priority value = dequeued first (min-heap by default)

// K largest elements (min-heap of size k)
int[] KLargest(int[] nums, int k) {
    var heap = new PriorityQueue<int, int>();
    foreach (int n in nums) {
        heap.Enqueue(n, n);
        if (heap.Count > k) heap.Dequeue(); // remove smallest
    }
    return heap.UnorderedItems.Select(x => x.Element).ToArray();
}

// Top K Frequent Elements
int[] TopKFrequent(int[] nums, int k) {
    var freq = new Dictionary<int, int>();
    foreach (int n in nums) freq[n] = freq.GetValueOrDefault(n) + 1;
    var heap = new PriorityQueue<int, int>();
    foreach (var (num, cnt) in freq) {
        heap.Enqueue(num, cnt);
        if (heap.Count > k) heap.Dequeue();
    }
    return heap.UnorderedItems.Select(x => x.Element).ToArray();
}

{id:10,name:"Union-Find (DSU)",emoji:"🔗",rank:"⭐ Common",color:"#E17055",bg:"#E1705515",border:"#E1705540",tc:"O(α(n)) ≈ O(1)",sc:"O(n)",
identify:["Dynamic connectivity problems","Number of connected components","Keywords: 'connected', 'same group', 'union', 'redundant edge'","Cycle detection in undirected graphs"],
whenToUse:"Use when you need to dynamically group elements and check connectivity. Faster than BFS/DFS for repeated connectivity queries.",
types:["Basic DSU","DSU with Rank + Path Compression","Weighted DSU"],
template:`class UnionFind {
    private int[] parent, rank;
    public int Components { get; private set; }
    public UnionFind(int n) {
        parent = Enumerable.Range(0, n).ToArray();
        rank = new int[n]; Components = n;
    }
    public int Find(int x) {
        if (parent[x] != x) parent[x] = Find(parent[x]); // path compression
        return parent[x];
    }
    public bool Union(int x, int y) {
        int px = Find(x), py = Find(y);
        if (px == py) return false;
        if (rank[px] < rank[py]) parent[px] = py;
        else if (rank[px] > rank[py]) parent[py] = px;
        else { parent[py] = px; rank[px]++; }
        Components--;
        return true;
    }
    public bool Connected(int x, int y) => Find(x) == Find(y);
}

// Usage: Number of islands with DSU
int NumIslandsDSU(char[][] grid) {
    int R=grid.Length, C=grid[0].Length;
    var uf = new UnionFind(R * C);
    int islands = 0;
    for (int r=0;r<R;r++) for (int c=0;c<C;c++)
        if (grid[r][c]=='1') {
            islands++;
            if(r+1<R&&grid[r+1][c]=='1'&&uf.Union(r*C+c,(r+1)*C+c)) islands--;
            if(c+1<C&&grid[r][c+1]=='1'&&uf.Union(r*C+c,r*C+c+1)) islands--;
        }
    return islands;
}`,

{id:11,name:"Monotonic Stack",emoji:"📚",rank:"⭐ Common",color:"#B8E994",bg:"#B8E99415",border:"#B8E99440",tc:"O(n)",sc:"O(n)",
identify:["Next greater/smaller element","Previous greater/smaller element","Histogram problems (largest rectangle)","Keywords: 'next greater', 'span', 'visible buildings'"],
whenToUse:"Use when you need the nearest greater/smaller element for each item. Stack maintains monotonic order; O(n) instead of O(n²) brute force.",
types:["Monotonic Decreasing (next greater)","Monotonic Increasing (next smaller)"],
template:`// Next Greater Element
int[] NextGreater(int[] nums) {
    var result = new int[nums.Length];
    Array.Fill(result, -1);
    var stack = new Stack<int>(); // stores indices
    for (int i = 0; i < nums.Length; i++) {
        while (stack.Count > 0 && nums[stack.Peek()] < nums[i])
            result[stack.Pop()] = nums[i]; // current is NGE
        stack.Push(i);
    }
    return result;
}

// Largest Rectangle in Histogram
int LargestRectangle(int[] heights) {
    var stack = new Stack<int>();
    int maxArea = 0, n = heights.Length;
    for (int i = 0; i <= n; i++) {
        int h = i == n ? 0 : heights[i];
        while (stack.Count > 0 && heights[stack.Peek()] > h) {
            int height = heights[stack.Pop()];
            int width = stack.Count > 0 ? i - stack.Peek() - 1 : i;
            maxArea = Math.Max(maxArea, height * width);
        }
        stack.Push(i);
    }
    return maxArea;
}

// Daily Temperatures
int[] DailyTemps(int[] temps) {
    var result = new int[temps.Length];
    var stack = new Stack<int>();
    for (int i = 0; i < temps.Length; i++) {
        while (stack.Count > 0 && temps[stack.Peek()] < temps[i]) {
            int idx = stack.Pop();
            result[idx] = i - idx;
        }
        stack.Push(i);
    }
    return result;

template:`// Build prefix sum
int[] BuildPrefix(int[] nums) {
    var prefix = new int[nums.Length + 1];
    for (int i = 0; i < nums.Length; i++)
        prefix[i+1] = prefix[i] + nums[i];
    // range [i,j] = prefix[j+1] - prefix[i]
    return prefix;
}

// Subarray sum equals K
int SubarraySum(int[] nums, int k) {
    var map = new Dictionary<int, int> { [0] = 1 };
    int sum = 0, count = 0;
    foreach (int n in nums) {
        sum += n;
        count += map.GetValueOrDefault(sum - k); // complement exists?
        map[sum] = map.GetValueOrDefault(sum) + 1;
    }
    return count;
}

// 2D prefix sum
int[,] Matrix2D(int[][] mat) {
    int m=mat.Length, n=mat[0].Length;
    var pre = new int[m+1, n+1];
    for(int i=1;i<=m;i++) for(int j=1;j<=n;j++)
        pre[i,j] = mat[i-1][j-1] + pre[i-1,j] + pre[i,j-1] - pre[i-1,j-1];
    // query(r1,c1,r2,c2) = pre[r2+1,c2+1]-pre[r1,c2+1]-pre[r2+1,c1]+pre[r1,c1]
    return pre;
}`,

template:`class TrieNode {
    public Dictionary<char, TrieNode> Children = new();
    public bool IsEnd = false;
}

class Trie {
    private TrieNode root = new TrieNode();

    public void Insert(string word) {
        var node = root;
        foreach (char ch in word) {
            if (!node.Children.ContainsKey(ch))
                node.Children[ch] = new TrieNode();
            node = node.Children[ch];
        }
        node.IsEnd = true;
    }

    public bool Search(string word) {
        var node = root;
        foreach (char ch in word) {
            if (!node.Children.ContainsKey(ch)) return false;
            node = node.Children[ch];
        }
        return node.IsEnd;
    }

    public bool StartsWith(string prefix) {
        var node = root;
        foreach (char ch in prefix) {
            if (!node.Children.ContainsKey(ch)) return false;
            node = node.Children[ch];
        }
        return true;
    }
}

{id:14,name:"Topological Sort",emoji:"📋",rank:"📌 Graph Specific",color:"#55EFC4",bg:"#55EFC415",border:"#55EFC440",tc:"O(V + E)",sc:"O(V + E)",
identify:["Task scheduling with dependencies","Course prerequisites","Keywords: 'order', 'prerequisite', 'dependency', 'DAG'","Detect cycle in directed graph"],
whenToUse:"Use for ordering tasks with dependencies (DAG). Kahn's (BFS+in-degree) or DFS-based. If a cycle exists, topological sort is impossible.",
types:["Kahn's Algorithm (BFS)","DFS-based"],
template:`// Kahn's Algorithm (BFS + in-degree)
int[] TopoSort(int n, int[][] prereqs) {
    var graph = new List<List<int>>();
    var inDeg = new int[n];
    for (int i=0;i<n;i++) graph.Add(new List<int>());
    foreach (var p in prereqs) { graph[p[1]].Add(p[0]); inDeg[p[0]]++; }
    var queue = new Queue<int>();
    for (int i=0;i<n;i++) if (inDeg[i]==0) queue.Enqueue(i);
    var order = new List<int>();
    while (queue.Count > 0) {
        int node = queue.Dequeue();
        order.Add(node);
        foreach (int nb in graph[node])
            if (--inDeg[nb]==0) queue.Enqueue(nb);
    }
    return order.Count==n ? order.ToArray() : Array.Empty<int>();
}

// DFS-based (post-order)
int[] TopoSortDfs(int n, int[][] edges) {
    var g = new List<List<int>>();
    for(int i=0;i<n;i++) g.Add(new List<int>());
    foreach(var e in edges) g[e[0]].Add(e[1]);
    var vis = new int[n]; // 0=new,1=visiting,2=done
    var res = new List<int>();
    bool Dfs(int v) {
        if (vis[v]==1) return false; // cycle!
        if (vis[v]==2) return true;
        vis[v]=1;
        foreach(int u in g[v]) if(!Dfs(u)) return false;
        vis[v]=2; res.Add(v); return true;
    }
    for(int i=0;i<n;i++) if(!Dfs(i)) return Array.Empty<int>();
    res.Reverse(); return res.ToArray();
}`,

problems:["Course Schedule","Course Schedule II","Alien Dictionary","Sequence Reconstruction","Build a Matrix With Conditions"],
trick:"order.Length < n → cycle exists. Kahn's is easier to code. DFS reverses post-order."},
];

{id:"l1",name:"Longest Substring Without Repeating Characters",lcNum:"3",diff:"medium",pattern:"Sliding Window",alts:["Two Pointers","Hash Map"],
approach:"Variable-size sliding window with a HashSet or Dictionary tracking current chars. Expand right pointer, adding chars. When duplicate found shrink left until duplicate removed. Track max window length. O(n) time O(k) space where k = charset size.",
followups:["Longest Substring with At Most Two Distinct Chars (LC 159)","Longest Substring with At Most K Distinct Chars (LC 340)","Minimum Window Substring (LC 76)","Fruit Into Baskets (LC 904)"],
similar:["Permutation in String","Minimum Window Substring","Longest Repeating Character Replacement"],
notes:"Use Dictionary<char,int> for counts so you handle duplicates correctly when shrinking. Edge cases: empty string → 0, single char → 1. Classic variable-window warm-up.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²) time, O(1) space
// Try every possible starting position and expand
public int LengthOfLongestSubstringBrute(string s) {
    int maxLen = 0;
    for (int i = 0; i < s.Length; i++) {
        var seen = new HashSet<char>();
        for (int j = i; j < s.Length; j++) {
            if (seen.Contains(s[j])) break;  // duplicate — stop
            seen.Add(s[j]);
            maxLen = Math.Max(maxLen, j - i + 1);
        }
    }
    return maxLen;
}`,why:`Brute force is O(n²) — we restart from every index. This is wasteful: when we hit a duplicate at position j, we don't need to restart from i+1 completely. We can simply SHRINK from the left until the duplicate is gone. That's exactly Sliding Window — one pass, two pointers.`,optimal:`// OPTIMAL — Sliding Window — O(n) time, O(k) space (k = charset)
public int LengthOfLongestSubstring(string s) {
    var freq = new Dictionary<char, int>();  // char → count in window
    int left = 0, maxLen = 0;

    for (int right = 0; right < s.Length; right++) {
        // expand: add s[right] to window
        freq[s[right]] = freq.GetValueOrDefault(s[right]) + 1;

        // shrink: while duplicate exists, move left pointer
        while (freq[s[right]] > 1) {
            freq[s[left]]--;
            if (freq[s[left]] == 0) freq.Remove(s[left]);
            left++;
        }

        maxLen = Math.Max(maxLen, right - left + 1);
    }
    return maxLen;
}`,alt:`// ALTERNATE — HashSet + index jump — O(n) avg
// When duplicate found, jump left directly to duplicate's position + 1
public int LengthOfLongestSubstringAlt(string s) {
    var lastIndex = new Dictionary<char, int>();
    int left = 0, maxLen = 0;

    for (int right = 0; right < s.Length; right++) {
        if (lastIndex.TryGetValue(s[right], out int prev) && prev >= left)
            left = prev + 1;  // jump left past the duplicate
        lastIndex[s[right]] = right;
        maxLen = Math.Max(maxLen, right - left + 1);
    }
    return maxLen;
}`}},

{id:"l2",name:"Minimum Window Substring",lcNum:"76",diff:"hard",pattern:"Sliding Window",alts:["Two Pointers","Hash Map"],
approach:"Variable-size sliding window with two freq maps — one for t, one for the window. Use 'formed' counter vs 'required' (distinct chars in t fully satisfied) to avoid scanning the map each step. Expand right, shrink left once formed==required. Track best (start, len). O(|s|+|t|) time O(|s|+|t|) space.",
followups:["Substring with Concatenation of All Words (LC 30)","Smallest Range Covering Elements from K Lists (LC 632)","Find All Anagrams in a String (LC 438)","Minimum Window Subsequence (LC 727)"],
similar:["Permutation in String","Find All Anagrams in a String","Longest Substring Without Repeating Chars"],
notes:"'Formed' counter avoids scanning 26-char map each step → O(1) per slide. Edge case: t longer than s → return ''. Characters in t may repeat — use counts not just presence.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²·m) time, O(m) space
// Try every substring of s, check if it contains all chars of t
public string MinWindowBrute(string s, string t) {
    if (s.Length < t.Length) return "";
    string result = "";
    var tFreq = new Dictionary<char, int>();
    foreach (char c in t) tFreq[c] = tFreq.GetValueOrDefault(c) + 1;

    for (int i = 0; i < s.Length; i++) {
        var window = new Dictionary<char, int>(tFreq);
        int matched = t.Length;
        for (int j = i; j < s.Length; j++) {
            if (window.ContainsKey(s[j]) && window[s[j]] > 0) matched--;
            window[s[j]] = window.GetValueOrDefault(s[j]) - 1;
            if (matched == 0) {
                if (result == "" || j - i + 1 < result.Length)
                    result = s.Substring(i, j - i + 1);
                break;
            }
        }
    }
    return result;
}`,why:`Brute force retries from every starting index — O(n²). The insight: once we have a valid window, we don't want to throw it away and restart. Instead, try to SHRINK from the left to find a smaller valid window. That's the variable sliding window pattern: expand right to satisfy the condition, shrink left to minimize.`,optimal:`// OPTIMAL — Variable Sliding Window — O(|s| + |t|) time, O(|s| + |t|) space
public string MinWindow(string s, string t) {
    if (s.Length < t.Length) return "";

    var tFreq = new Dictionary<char, int>();
    foreach (char c in t) tFreq[c] = tFreq.GetValueOrDefault(c) + 1;

    int required = tFreq.Count;  // distinct chars in t that must be fully satisfied
    int formed = 0;              // distinct chars currently fully satisfied in window
    var windowFreq = new Dictionary<char, int>();

    int left = 0, minLen = int.MaxValue, minStart = 0;

    for (int right = 0; right < s.Length; right++) {
        // expand: add s[right]
        char rc = s[right];
        windowFreq[rc] = windowFreq.GetValueOrDefault(rc) + 1;
        if (tFreq.ContainsKey(rc) && windowFreq[rc] == tFreq[rc])
            formed++;

        // shrink: while window is valid, try to minimize it
        while (formed == required) {
            if (right - left + 1 < minLen) {
                minLen = right - left + 1;
                minStart = left;
            }
            char lc = s[left++];
            windowFreq[lc]--;
            if (tFreq.ContainsKey(lc) && windowFreq[lc] < tFreq[lc])
                formed--;
        }
    }
    return minLen == int.MaxValue ? "" : s.Substring(minStart, minLen);
}`,alt:""}},

{id:"l3",name:"Max Sum Subarray of Size K",lcNum:"",diff:"easy",pattern:"Sliding Window",alts:["Prefix Sum"],
approach:"Fixed-size window of size k. Build first window sum in O(k), then slide: subtract element leaving left, add element entering right. Track running max. O(n) time O(1) space. This is the canonical fixed-window template — master before variable-window.",
followups:["Maximum Average Subarray I (LC 643)","Max Consecutive Ones III (LC 1004)","Subarray Product Less Than K (LC 713)","Diet Plan Performance (LC 1176)"],
similar:["Maximum Average Subarray I","Sliding Window Maximum","Subarray Sum Equals K"],
notes:"Prefix sum alternative: max(prefix[i+k] - prefix[i]). Both O(n) but sliding window is O(1) space. Great warm-up before Min Window Substring.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n·k) time, O(1) space
// Compute sum of every window of size k from scratch
public int MaxSumSubarrayBrute(int[] arr, int k) {
    int maxSum = int.MinValue;
    for (int i = 0; i <= arr.Length - k; i++) {
        int windowSum = 0;
        for (int j = i; j < i + k; j++) windowSum += arr[j];
        maxSum = Math.Max(maxSum, windowSum);
    }
    return maxSum;
}`,why:`Brute force recomputes the sum for every window — O(n·k). But each time we slide the window one step, only ONE element enters and ONE element leaves. We can maintain a running sum and just do those two operations per step — O(1) per slide. That's the fixed sliding window pattern.`,optimal:`// OPTIMAL — Fixed Sliding Window — O(n) time, O(1) space
public int MaxSumSubarray(int[] arr, int k) {
    if (arr.Length < k) return -1;

    // build first window
    int windowSum = 0;
    for (int i = 0; i < k; i++) windowSum += arr[i];
    int maxSum = windowSum;

    // slide: subtract leaving element, add entering element
    for (int i = k; i < arr.Length; i++) {
        windowSum += arr[i] - arr[i - k];
        maxSum = Math.Max(maxSum, windowSum);
    }
    return maxSum;
}`,alt:`// ALTERNATE — Prefix Sum — O(n) time, O(n) space
public int MaxSumSubarrayPrefix(int[] arr, int k) {
    int n = arr.Length;
    var prefix = new int[n + 1];
    for (int i = 0; i < n; i++) prefix[i + 1] = prefix[i] + arr[i];

    int maxSum = int.MinValue;
    for (int i = k; i <= n; i++)
        maxSum = Math.Max(maxSum, prefix[i] - prefix[i - k]);
    return maxSum;
}`}},

solution:{brute:`// BRUTE FORCE — O(|s1|·|s2|) time, O(|s1|) space
// Generate all substrings of length |s1|, sort each and compare to sorted s1
public bool CheckInclusionBrute(string s1, string s2) {
    if (s1.Length > s2.Length) return false;
    char[] sorted1 = s1.ToCharArray(); Array.Sort(sorted1);
    for (int i = 0; i <= s2.Length - s1.Length; i++) {
        char[] window = s2.Substring(i, s1.Length).ToCharArray();
        Array.Sort(window);
        if (new string(window) == new string(sorted1)) return true;
    }
    return false;
}`,why:`Brute force sorts every window — O(|s1| log|s1|) per window. Since a permutation is just a rearrangement, two strings are permutations of each other iff their character frequency arrays are equal. Maintaining a sliding freq array of fixed size |s1| and a 'matches' counter lets us slide in O(1) per step.`,optimal:`// OPTIMAL — Fixed Sliding Window with freq array — O(|s1|+|s2|) time, O(1) space
public bool CheckInclusion(string s1, string s2) {
    if (s1.Length > s2.Length) return false;
    int[] freq1 = new int[26], freq2 = new int[26];

    // build initial window of size |s1|
    for (int i = 0; i < s1.Length; i++) {
        freq1[s1[i] - 'a']++;
        freq2[s2[i] - 'a']++;
    }

    int matches = 0;
    for (int i = 0; i < 26; i++) if (freq1[i] == freq2[i]) matches++;

    for (int i = s1.Length; i < s2.Length; i++) {
        if (matches == 26) return true;

        // add new right char
        int r = s2[i] - 'a';
        freq2[r]++;
        if (freq1[r] == freq2[r]) matches++;
        else if (freq1[r] + 1 == freq2[r]) matches--;  // was equal, now over

        // remove old left char
        int l = s2[i - s1.Length] - 'a';
        freq2[l]--;
        if (freq1[l] == freq2[l]) matches++;
        else if (freq1[l] - 1 == freq2[l]) matches--;  // was equal, now under
    }
    return matches == 26;
}`,alt:""}},

// Try all pairs (same as unsorted Two Sum)
public int[] TwoSumBrute(int[] numbers, int target) {
    for (int i = 0; i < numbers.Length; i++)
        for (int j = i + 1; j < numbers.Length; j++)
            if (numbers[i] + numbers[j] == target)
                return new[] { i + 1, j + 1 };  // 1-indexed
    return new[] { -1, -1 };
}`,why:`The array is already sorted. When sum < target we need a larger value — move left pointer right. When sum > target we need a smaller value — move right pointer left. This greedy choice is always correct because the array is sorted, giving O(n) with O(1) space.`,optimal:`// OPTIMAL — Two Pointers — O(n) time, O(1) space
public int[] TwoSum(int[] numbers, int target) {
    int left = 0, right = numbers.Length - 1;
    while (left < right) {
        int sum = numbers[left] + numbers[right];
        if (sum == target) return new[] { left + 1, right + 1 };
        else if (sum < target) left++;   // need bigger sum
        else right--;                    // need smaller sum
    }
    return new[] { -1, -1 };
}`,alt:`// ALTERNATE — Binary Search — O(n log n) time, O(1) space
public int[] TwoSumBinarySearch(int[] numbers, int target) {
    for (int i = 0; i < numbers.Length; i++) {
        int complement = target - numbers[i];
        int lo = i + 1, hi = numbers.Length - 1;
        while (lo <= hi) {
            int mid = lo + (hi - lo) / 2;
            if (numbers[mid] == complement) return new[] { i + 1, mid + 1 };
            else if (numbers[mid] < complement) lo = mid + 1;
            else hi = mid - 1;
        }
    }

approach:"Opposite-direction two pointers. Area = min(height[l], height[r]) * (r - l). Always move the pointer with the smaller height (moving taller can only shrink width without guarantee of height gain). O(n) time O(1) space.",

solution:{brute:`// BRUTE FORCE — O(n²) time, O(1) space
public int MaxAreaBrute(int[] height) {
    int maxArea = 0;
    for (int i = 0; i < height.Length; i++)
        for (int j = i + 1; j < height.Length; j++)
            maxArea = Math.Max(maxArea, Math.Min(height[i], height[j]) * (j - i));
    return maxArea;
}`,why:`We want to maximize min(height[l], height[r]) * (r - l). Brute force tries all pairs O(n²). Key insight: if we move the taller pointer inward, width always decreases and height can only stay the same or decrease (bounded by the shorter) — we'd never improve. So we must move the SHORTER pointer, giving O(n).`,optimal:`// OPTIMAL — Two Pointers (Greedy) — O(n) time, O(1) space
public int MaxArea(int[] height) {
    int left = 0, right = height.Length - 1, maxArea = 0;

    while (left < right) {
        int area = Math.Min(height[left], height[right]) * (right - left);
        maxArea = Math.Max(maxArea, area);

        // move the pointer with smaller height — only way to potentially improve
        if (height[left] < height[right]) left++;
        else right--;
    }
    return maxArea;
}`,alt:""}},

{id:"l8",name:"Trapping Rain Water",lcNum:"42",diff:"hard",pattern:"Two Pointers",alts:["Monotonic Stack","Prefix Sum"],
approach:"Two pointers from both ends. Maintain leftMax and rightMax. Water at position i = min(leftMax, rightMax) - height[i]. Move the pointer whose max is smaller, updating max as we go. O(n) time O(1) space. Alternative: precompute prefix/suffix max arrays O(n) space.",

similar:["Container With Most Water","Largest Rectangle in Histogram","Sliding Window Maximum"],
notes:"Monotonic stack approach also O(n) and more intuitive: pop when current > stack top, calculate trapped water horizontally. Two-pointer approach is optimal for space. Classic hard — understand both approaches.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²) time, O(1) space
// For each bar, scan left for leftMax and right for rightMax
public int TrapBrute(int[] height) {
    int total = 0;
    for (int i = 1; i < height.Length - 1; i++) {
        int leftMax = 0, rightMax = 0;
        for (int j = 0; j <= i; j++) leftMax = Math.Max(leftMax, height[j]);
        for (int j = i; j < height.Length; j++) rightMax = Math.Max(rightMax, height[j]);
        total += Math.Min(leftMax, rightMax) - height[i];
    }
    return total;
}`,why:`Water at index i = min(leftMax[i], rightMax[i]) - height[i]. Brute force recomputes these maxes for each bar O(n²). We can precompute prefix max arrays in O(n). Better yet: two pointers from both ends — the pointer with the SMALLER max can be processed immediately because the water level is determined by that smaller max.`,optimal:`// OPTIMAL — Two Pointers — O(n) time, O(1) space
public int Trap(int[] height) {
    int left = 0, right = height.Length - 1;
    int leftMax = 0, rightMax = 0, total = 0;

    while (left < right) {
        if (height[left] < height[right]) {
            // leftMax is the bottleneck — process left side
            leftMax = Math.Max(leftMax, height[left]);
            total += leftMax - height[left];
            left++;
        } else {
            rightMax = Math.Max(rightMax, height[right]);
            total += rightMax - height[right];
            right--;
        }
    }
    return total;
}`,alt:`// ALTERNATE — Monotonic Stack — O(n) time, O(n) space
// Computes water horizontally layer by layer
public int TrapStack(int[] height) {
    var stack = new Stack<int>();  // indices, decreasing heights
    int total = 0;

    for (int i = 0; i < height.Length; i++) {
        while (stack.Count > 0 && height[i] > height[stack.Peek()]) {
            int bottom = stack.Pop();
            if (stack.Count == 0) break;
            int width = i - stack.Peek() - 1;
            int h = Math.Min(height[stack.Peek()], height[i]) - height[bottom];
            total += h * width;
        }
        stack.Push(i);
    }
    return total;
}`}},

solution:{brute:`// BRUTE FORCE — O(n) time, O(n) space
// Store all visited nodes in a HashSet
public bool HasCycleBrute(ListNode head) {
    var seen = new HashSet<ListNode>();
    var curr = head;

    }

}`,why:`HashSet works but uses O(n) extra space. Floyd's algorithm: fast pointer moves 2 steps, slow moves 1. If there's a cycle, fast will eventually lap slow and they'll meet. If no cycle, fast reaches null. O(1) space — no extra storage needed.`,optimal:`// OPTIMAL — Fast & Slow Pointers (Floyd's) — O(n) time, O(1) space
public bool HasCycle(ListNode head) {
    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
        if (slow == fast) return true;  // cycle detected
    }
    return false;  // fast reached end → no cycle
}`,alt:`// BONUS — Find cycle start (LC 142)

    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next; fast = fast.next.next;
        if (slow == fast) {
            slow = head;  // reset slow to head
            while (slow != fast) { slow = slow.next; fast = fast.next; }

public bool IsHappy(int n) {
    int slow = n, fast = DigitSquareSum(n);

    }
    return fast == 1;
}
private int DigitSquareSum(int n) {
    int sum = 0;
    while (n > 0) { int d = n % 10; sum += d * d; n /= 10; }

{id:"l19",name:"Median of Two Sorted Arrays",lcNum:"4",diff:"hard",pattern:"Binary Search",alts:["Merge (O(m+n))"],
approach:"Binary search on partition of the smaller array. Find partition point where left half of both arrays combined has (m+n)/2 elements and max(left) <= min(right). Adjust lo/hi based on cross-comparison. O(log(min(m,n))) time O(1) space.",

similar:["Kth Smallest Element in Sorted Matrix","Find K-th Smallest Pair Distance"],
notes:"Hardest binary search problem. Always binary search on the smaller array for efficiency. Handle edge partitions (left=INT_MIN, right=INT_MAX). Treat as 'partition binary search' not 'value binary search'. Often asked at Google for senior roles.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O((m+n) log(m+n)) time, O(m+n) space
// Merge both arrays, find median
public double FindMedianSortedArraysBrute(int[] nums1, int[] nums2) {
    var merged = nums1.Concat(nums2).OrderBy(x => x).ToArray();
    int n = merged.Length;
    return n % 2 == 0 ? (merged[n/2-1] + merged[n/2]) / 2.0 : merged[n/2];
}`,why:`We need the median without merging — O(log(min(m,n))). Binary search on the partition of the smaller array: find where to cut both arrays so the left halves combined have (m+n)/2 elements and max(left) ≤ min(right). Adjust the cut using binary search.`,optimal:`// OPTIMAL — Binary Search on Partition — O(log(min(m,n))) time, O(1) space
public double FindMedianSortedArrays(int[] nums1, int[] nums2) {
    // always binary search on smaller array
    if (nums1.Length > nums2.Length) return FindMedianSortedArrays(nums2, nums1);

    int m = nums1.Length, n = nums2.Length;
    int lo = 0, hi = m;

    while (lo <= hi) {
        int partX = lo + (hi - lo) / 2;
        int partY = (m + n + 1) / 2 - partX;

        int maxLeftX  = partX == 0 ? int.MinValue : nums1[partX - 1];
        int minRightX = partX == m ? int.MaxValue  : nums1[partX];
        int maxLeftY  = partY == 0 ? int.MinValue : nums2[partY - 1];
        int minRightY = partY == n ? int.MaxValue  : nums2[partY];

        if (maxLeftX <= minRightY && maxLeftY <= minRightX) {
            // correct partition found
            if ((m + n) % 2 == 1) return Math.Max(maxLeftX, maxLeftY);
            return (Math.Max(maxLeftX, maxLeftY) + Math.Min(minRightX, minRightY)) / 2.0;
        } else if (maxLeftX > minRightY) hi = partX - 1;
        else lo = partX + 1;
    }
    return 0;
}`,alt:""}},

{id:"l20",name:"Binary Tree Level Order Traversal",lcNum:"102",diff:"medium",pattern:"BFS",alts:["DFS with level tracking"],
approach:"Standard BFS with Queue. At each level, record queue size first, then process exactly that many nodes, adding their children. This cleanly separates levels. O(n) time O(n) space (queue can hold a full level).",
followups:["Binary Tree Level Order Traversal II (LC 107) — reverse result","Binary Tree Zigzag Level Order (LC 103) — alternate direction","Average of Levels (LC 637)","Right Side View (LC 199)"],
similar:["Binary Tree Right Side View","Binary Tree Zigzag Traversal","N-ary Tree Level Order"],
notes:"The 'capture levelSize before loop' pattern is the key: int size = q.Count; for(int i=0;i<size;i++){...}. This is cleaner than using null sentinels. DFS alternative: pass depth parameter, result[depth].Add(val).",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — same as optimal for BFS (it IS O(n))
// DFS with level tracking — technically also O(n) but harder to read
public IList<IList<int>> LevelOrderDFS(TreeNode root) {
    var result = new List<IList<int>>();
    void Dfs(TreeNode node, int depth) {
        if (node == null) return;
        if (result.Count == depth) result.Add(new List<int>());
        result[depth].Add(node.val);
        Dfs(node.left, depth + 1);
        Dfs(node.right, depth + 1);
    }
    Dfs(root, 0);
    return result;
}`,why:`Level order traversal is inherently BFS — we process nodes level by level. DFS can simulate it but requires passing depth, and visits nodes in an unnatural order. BFS with a queue is the natural, clean solution: capture queue size at each level to separate levels perfectly.`,optimal:`// OPTIMAL — BFS with Queue — O(n) time, O(n) space
public IList<IList<int>> LevelOrder(TreeNode root) {
    var result = new List<IList<int>>();
    if (root == null) return result;

    var queue = new Queue<TreeNode>();
    queue.Enqueue(root);

    while (queue.Count > 0) {
        int levelSize = queue.Count;  // capture before expanding
        var level = new List<int>();

        for (int i = 0; i < levelSize; i++) {
            var node = queue.Dequeue();
            level.Add(node.val);
            if (node.left != null) queue.Enqueue(node.left);
            if (node.right != null) queue.Enqueue(node.right);
        }
        result.Add(level);
    }
    return result;
}`,alt:""}},

{id:"l21",name:"Word Ladder",lcNum:"127",diff:"hard",pattern:"BFS",alts:["Bidirectional BFS"],
approach:"BFS treating each word as a node. Neighbors = words differing by exactly one char. Build adjacency by trying all 26 letter substitutions at each position and checking against a word set. BFS guarantees shortest path. O(m²·n) time where m=word length, n=wordList size.",
followups:["Word Ladder II (LC 126) — return all shortest paths (DFS+BFS)","Minimum Genetic Mutation (LC 433) — same template","Open the Lock (LC 752)","Word Transformation"],
similar:["Minimum Genetic Mutation","Open the Lock","Jump Game IV"],
notes:"Use HashSet for wordList for O(1) lookup. Remove words from set when visited (instead of separate visited set) to avoid revisiting. Bidirectional BFS cuts search space roughly in half — mention as optimization.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — DFS (finds A path, not SHORTEST) — incorrect for shortest
// BFS is mandatory for shortest path in unweighted graphs — DFS doesn't guarantee it
// Shown here only to illustrate why BFS is needed:
public int LadderLengthDFS(string beginWord, string endWord, IList<string> wordList) {
    // DFS would find some path but not necessarily the shortest
    // This is fundamentally wrong for "minimum" transformations
    // Use BFS below instead
    return -1; // placeholder — always use BFS for shortest path
}`,why:`We need the SHORTEST transformation sequence — DFS explores depth-first and may find a long path before a short one. BFS explores all paths of length 1, then length 2, etc., guaranteeing the first time we reach endWord is the shortest path.`,optimal:`// OPTIMAL — BFS — O(m²·n) time where m=word length, n=wordList size
public int LadderLength(string beginWord, string endWord, IList<string> wordList) {
    var wordSet = new HashSet<string>(wordList);
    if (!wordSet.Contains(endWord)) return 0;

    var queue = new Queue<string>();
    queue.Enqueue(beginWord);
    wordSet.Remove(beginWord);  // mark visited by removing from set
    int steps = 1;

    while (queue.Count > 0) {
        int levelSize = queue.Count;
        for (int i = 0; i < levelSize; i++) {
            string word = queue.Dequeue();
            if (word == endWord) return steps;

            char[] arr = word.ToCharArray();
            for (int j = 0; j < arr.Length; j++) {
                char orig = arr[j];
                for (char c = 'a'; c <= 'z'; c++) {
                    if (c == orig) continue;
                    arr[j] = c;
                    string next = new string(arr);
                    if (wordSet.Contains(next)) {
                        queue.Enqueue(next);
                        wordSet.Remove(next);  // visited
                    }
                }
                arr[j] = orig;  // restore
            }
        }
        steps++;
    }
    return 0;
}`,alt:""}},

solution:{brute:`// BRUTE FORCE — Simulation minute by minute — O((m·n)²) time
// Each minute, scan entire grid to find new rottings
public int OrangesRottingBrute(int[][] grid) {
    int m = grid.Length, n = grid[0].Length;
    bool changed = true;
    int minutes = 0;
    while (changed) {
        changed = false;
        var toRot = new List<(int,int)>();
        for (int r = 0; r < m; r++)
            for (int c = 0; c < n; c++)
                if (grid[r][c] == 2)
                    foreach (var (dr,dc) in new[]{(0,1),(0,-1),(1,0),(-1,0)}) {
                        int nr=r+dr, nc=c+dc;
                        if (nr>=0&&nr<m&&nc>=0&&nc<n&&grid[nr][nc]==1)
                            toRot.Add((nr,nc));
                    }
        foreach (var (r,c) in toRot) { grid[r][c]=2; changed=true; }
        if (changed) minutes++;
    }
    int fresh = 0;
    for (int r=0;r<m;r++) for(int c=0;c<n;c++) if(grid[r][c]==1) fresh++;
    return fresh>0 ? -1 : minutes;
}`,why:`Simulation rescans the entire grid each minute — O((m·n)²). Multi-source BFS starts from ALL rotten oranges simultaneously (in one queue), then spreads level by level — each BFS level = 1 minute. O(m·n) total, each cell processed at most once.`,optimal:`// OPTIMAL — Multi-Source BFS — O(m·n) time, O(m·n) space
public int OrangesRotting(int[][] grid) {
    int m = grid.Length, n = grid[0].Length;
    var queue = new Queue<(int r, int c)>();
    int fresh = 0;

    // seed queue with all rotten oranges simultaneously
    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++) {
            if (grid[r][c] == 2) queue.Enqueue((r, c));
            else if (grid[r][c] == 1) fresh++;
        }

    int minutes = 0;
    int[][] dirs = { new[]{0,1}, new[]{0,-1}, new[]{1,0}, new[]{-1,0} };

    while (queue.Count > 0 && fresh > 0) {
        int levelSize = queue.Count;
        for (int i = 0; i < levelSize; i++) {
            var (r, c) = queue.Dequeue();
            foreach (var d in dirs) {
                int nr = r + d[0], nc = c + d[1];
                if (nr >= 0 && nr < m && nc >= 0 && nc < n && grid[nr][nc] == 1) {
                    grid[nr][nc] = 2;
                    fresh--;
                    queue.Enqueue((nr, nc));
                }
            }
        }
        minutes++;
    }
    return fresh == 0 ? minutes : -1;

solution:{brute:`// BRUTE FORCE — DFS (not guaranteed shortest) — shown for comparison only
// DFS explores all paths, minimum tracked — O(2^(n²)) worst case — TLE
public int ShortestPathBinaryMatrixDFS(int[][] grid) {
    int n = grid.Length;
    if (grid[0][0] == 1 || grid[n-1][n-1] == 1) return -1;
    int min = int.MaxValue;
    void Dfs(int r, int c, int steps, bool[][] vis) {
        if (r<0||r>=n||c<0||c>=n||grid[r][c]==1||vis[r][c]) return;
        if (r==n-1&&c==n-1) { min=Math.Min(min,steps); return; }
        vis[r][c]=true;
        for(int dr=-1;dr<=1;dr++) for(int dc=-1;dc<=1;dc++)
            if(dr!=0||dc!=0) Dfs(r+dr,c+dc,steps+1,vis);

    return min==int.MaxValue?-1:min;

public int ShortestPathBinaryMatrix(int[][] grid) {
    int n = grid.Length;
    if (grid[0][0] == 1 || grid[n-1][n-1] == 1) return -1;

    var queue = new Queue<(int r, int c, int dist)>();
    queue.Enqueue((0, 0, 1));
    grid[0][0] = 1;  // mark visited

    int[][] dirs = {
        new[]{-1,-1},new[]{-1,0},new[]{-1,1},
        new[]{0,-1},           new[]{0,1},
        new[]{1,-1}, new[]{1,0}, new[]{1,1}
    };

    while (queue.Count > 0) {
        var (r, c, dist) = queue.Dequeue();
        if (r == n-1 && c == n-1) return dist;

        foreach (var d in dirs) {
            int nr = r + d[0], nc = c + d[1];
            if (nr >= 0 && nr < n && nc >= 0 && nc < n && grid[nr][nc] == 0) {
                grid[nr][nc] = 1;  // mark visited on enqueue

{id:"l24",name:"Number of Islands",lcNum:"200",diff:"medium",pattern:"BFS",alts:["DFS","Union-Find"],
approach:"BFS or DFS from each unvisited '1'. Mark all connected '1's as '0' (or visited). Count how many times we start a new BFS — that's the island count. O(m·n) time O(min(m,n)) space for BFS queue.",

notes:"BFS, DFS, and Union-Find all work. BFS queue size O(min(m,n)) since a snake-like island fills queue by width. DFS risks stack overflow on large grids. Union-Find is best for dynamic connectivity (islands added over time).",date:"2026-03-14",
solution:{brute:`// There is no "brute force" that's meaningfully worse here —
// any correct solution visits each cell O(1) times = O(m·n).
// Below is the DFS approach (equally valid, shown for comparison):
public int NumIslandsDFS_Brute(char[][] grid) {
    int count = 0;
    for (int r = 0; r < grid.Length; r++)
        for (int c = 0; c < grid[0].Length; c++)
            if (grid[r][c] == '1') { DfsSink(grid, r, c); count++; }
    return count;
}
private void DfsSink(char[][] grid, int r, int c) {
    if (r<0||r>=grid.Length||c<0||c>=grid[0].Length||grid[r][c]!='1') return;
    grid[r][c] = '0';
    DfsSink(grid,r+1,c); DfsSink(grid,r-1,c);
    DfsSink(grid,r,c+1); DfsSink(grid,r,c-1);
}`,why:`BFS and DFS both process each cell once — both O(m·n). BFS is preferred when the grid is large (DFS can stack-overflow on a 300×300 all-'1' grid). BFS queue size is bounded by min(m,n) for a snake-shaped island.`,optimal:`// OPTIMAL — BFS — O(m·n) time, O(min(m,n)) space
public int NumIslands(char[][] grid) {
    int m = grid.Length, n = grid[0].Length, count = 0;
    int[][] dirs = { new[]{0,1}, new[]{0,-1}, new[]{1,0}, new[]{-1,0} };

    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            if (grid[r][c] == '1') {
                count++;
                var queue = new Queue<(int,int)>();
                queue.Enqueue((r, c));
                grid[r][c] = '0';  // mark visited immediately
                while (queue.Count > 0) {
                    var (cr, cc) = queue.Dequeue();
                    foreach (var d in dirs) {
                        int nr = cr+d[0], nc = cc+d[1];
                        if (nr>=0&&nr<m&&nc>=0&&nc<n&&grid[nr][nc]=='1') {
                            grid[nr][nc]='0';
                            queue.Enqueue((nr,nc));
                        }
                    }
                }
            }
    return count;
}`,alt:`// ALTERNATE — Union-Find — O(m·n·α(m·n)) ≈ O(m·n) time
// Best when islands are added dynamically (online queries)
public int NumIslandsUF(char[][] grid) {
    int m = grid.Length, n = grid[0].Length;
    int[] parent = Enumerable.Range(0, m * n).ToArray();
    int[] rank = new int[m * n];
    int components = 0;

    int Find(int x) { if (parent[x]!=x) parent[x]=Find(parent[x]); return parent[x]; }
    void Union(int x, int y) {
        int px=Find(x), py=Find(y); if(px==py) return;
        if(rank[px]<rank[py]) parent[px]=py;
        else if(rank[px]>rank[py]) parent[py]=px;
        else { parent[py]=px; rank[px]++; }
        components--;
    }

    for (int r=0;r<m;r++) for(int c=0;c<n;c++)
        if (grid[r][c]=='1') {
            components++;
            if (r+1<m && grid[r+1][c]=='1') Union(r*n+c,(r+1)*n+c);
            if (c+1<n && grid[r][c+1]=='1') Union(r*n+c,r*n+c+1);
        }
    return components;
}`}},

solution:{brute:`// BRUTE FORCE — DFS collecting all nodes, pick last per level
public IList<int> RightSideViewBrute(TreeNode root) {
    var levels = new List<IList<int>>();
    void Dfs(TreeNode node, int depth) {
        if (node == null) return;
        if (levels.Count == depth) levels.Add(new List<int>());
        levels[depth].Add(node.val);
        Dfs(node.left, depth + 1);
        Dfs(node.right, depth + 1);
    }
    Dfs(root, 0);
    return levels.Select(l => l.Last()).ToList();
}`,why:`BFS gives us exact level boundaries for free — the last element dequeued in each level is the rightmost visible node. Cleaner than DFS which requires collecting all values per level then taking the last.`,optimal:`// OPTIMAL — BFS level order, record last node per level — O(n) time, O(n) space
public IList<int> RightSideView(TreeNode root) {
    var result = new List<int>();
    if (root == null) return result;

    var queue = new Queue<TreeNode>();
    queue.Enqueue(root);

    while (queue.Count > 0) {
        int levelSize = queue.Count;
        for (int i = 0; i < levelSize; i++) {
            var node = queue.Dequeue();
            if (i == levelSize - 1) result.Add(node.val);  // last in level = rightmost
            if (node.left != null) queue.Enqueue(node.left);
            if (node.right != null) queue.Enqueue(node.right);
        }
    }
    return result;
}`,alt:`// ALTERNATE — DFS right-first — O(n) time, O(h) space
// Visit right child before left; first node at each depth is rightmost
public IList<int> RightSideViewDFS(TreeNode root) {
    var result = new List<int>();
    void Dfs(TreeNode node, int depth) {
        if (node == null) return;
        if (result.Count == depth) result.Add(node.val);  // first visit at this depth
        Dfs(node.right, depth + 1);  // right first!
        Dfs(node.left, depth + 1);
    }
    Dfs(root, 0);
    return result;
}`}},

approach:"DFS from each unvisited '1'. Recursively mark all 4-directionally connected '1's as visited. Count DFS calls from main loop. O(m·n) time O(m·n) space (recursion stack in worst case). Mark visited by setting grid[r][c]='0'.",
followups:["Max Area of Island (LC 695)","Pacific Atlantic Water Flow (LC 417)","Surrounded Regions (LC 130)","Number of Enclaves (LC 1020)"],
similar:["Max Area of Island","Pacific Atlantic Water Flow","Surrounded Regions"],
notes:"In-place marking (grid[r][c]='0') avoids a visited array. Check bounds + not '0' in one condition. Recursion stack can overflow for 300x300 grid of '1's — mention BFS as stack-safe alternative.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — same asymptotic but O(m·n) extra space for visited array
public int NumIslandsDFSBrute(char[][] grid) {
    int m = grid.Length, n = grid[0].Length;
    bool[][] visited = new bool[m][];
    for (int i = 0; i < m; i++) visited[i] = new bool[n];
    int count = 0;
    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            if (grid[r][c] == '1' && !visited[r][c]) { DFS(grid,visited,r,c); count++; }
    return count;
}
void DFS(char[][] grid, bool[][] vis, int r, int c) {
    if (r<0||r>=grid.Length||c<0||c>=grid[0].Length||grid[r][c]!='1'||vis[r][c]) return;
    vis[r][c]=true;
    DFS(grid,vis,r+1,c); DFS(grid,vis,r-1,c); DFS(grid,vis,r,c+1); DFS(grid,vis,r,c-1);
}`,why:`Marking grid[r][c]='0' in-place eliminates the need for a visited array, saving O(m·n) space. DFS is natural here: sink the entire island recursively, then count how many times we had to start a new DFS.`,optimal:`// OPTIMAL — DFS with in-place marking — O(m·n) time, O(m·n) stack space
public int NumIslandsDFS(char[][] grid) {
    int m = grid.Length, n = grid[0].Length, count = 0;

    void Dfs(int r, int c) {
        if (r<0||r>=m||c<0||c>=n||grid[r][c]!='1') return;
        grid[r][c] = '0';  // sink — mark as visited
        Dfs(r+1,c); Dfs(r-1,c); Dfs(r,c+1); Dfs(r,c-1);
    }

    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            if (grid[r][c] == '1') { Dfs(r, c); count++; }

    return count;
}`,alt:""}},

{id:"l27",name:"Pacific Atlantic Water Flow",lcNum:"417",diff:"medium",pattern:"DFS / Backtracking",alts:["BFS"],
approach:"Reverse thinking: instead of water flowing down to ocean, do DFS inward from each ocean border. Mark cells reachable from Pacific (left/top borders) and from Atlantic (right/bottom borders). Answer = intersection. O(m·n) time O(m·n) space.",
followups:["Number of Islands (LC 200)","Surrounded Regions (LC 130)","Number of Enclaves (LC 1020)","Maximum Area of Island (LC 695)"],
similar:["Number of Islands","Surrounded Regions","Number of Enclaves"],
notes:"Reverse direction is the key insight — flow uphill from ocean borders. DFS condition: next cell must be >= current cell (water flows in reverse uphill). Works for both BFS and DFS — BFS is slightly easier to reason about bounds.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(m·n · max(m,n)) — DFS from every cell, check reachability
public IList<IList<int>> PacificAtlanticBrute(int[][] heights) {
    int m = heights.Length, n = heights[0].Length;
    var result = new List<IList<int>>();
    bool CanReach(int sr, int sc, bool pacific) {
        bool[][] vis = new bool[m][];
        for(int i=0;i<m;i++) vis[i]=new bool[n];
        bool found = false;
        void Dfs(int r, int c) {
            if(found) return; vis[r][c]=true;
            if(pacific&&(r==0||c==0)) { found=true; return; }
            if(!pacific&&(r==m-1||c==n-1)) { found=true; return; }
            int[][] d={{0,1},{0,-1},{1,0},{-1,0}};
            foreach(var dir in d) { int nr=r+dir[0],nc=c+dir[1];
                if(nr>=0&&nr<m&&nc>=0&&nc<n&&!vis[nr][nc]&&heights[nr][nc]<=heights[r][c]) Dfs(nr,nc);}
        }
        Dfs(sr,sc); return found;
    }
    for(int r=0;r<m;r++) for(int c=0;c<n;c++)
        if(CanReach(r,c,true)&&CanReach(r,c,false)) result.Add(new[]{r,c});
    return result;
}`,why:`Brute force DFS from every cell is O(m²·n²). The key insight: instead of asking 'can this cell reach the ocean?', ask the reverse: 'which cells can the ocean reach?' — flow INWARD from ocean borders (water flows uphill in reverse). Two BFS/DFS sweeps, one per ocean. O(m·n).`,optimal:`// OPTIMAL — Reverse DFS from ocean borders — O(m·n) time, O(m·n) space
public IList<IList<int>> PacificAtlantic(int[][] heights) {
    int m = heights.Length, n = heights[0].Length;
    bool[][] pac = new bool[m][], atl = new bool[m][];
    for(int i=0;i<m;i++){pac[i]=new bool[n];atl[i]=new bool[n];}

    void Dfs(int r, int c, bool[][] visited) {
        visited[r][c] = true;
        int[][] dirs = {{0,1},{0,-1},{1,0},{-1,0}};
        foreach(var d in dirs) {
            int nr=r+d[0], nc=c+d[1];
            // flow inward: next cell must be >= current (uphill reverse)
            if(nr>=0&&nr<m&&nc>=0&&nc<n&&!visited[nr][nc]&&heights[nr][nc]>=heights[r][c])
                Dfs(nr,nc,visited);
        }
    }

    // Pacific: top row + left col borders
    for(int r=0;r<m;r++) if(!pac[r][0]) Dfs(r,0,pac);
    for(int c=0;c<n;c++) if(!pac[0][c]) Dfs(0,c,pac);

    // Atlantic: bottom row + right col borders
    for(int r=0;r<m;r++) if(!atl[r][n-1]) Dfs(r,n-1,atl);
    for(int c=0;c<n;c++) if(!atl[m-1][c]) Dfs(m-1,c,atl);

    var result = new List<IList<int>>();
    for(int r=0;r<m;r++) for(int c=0;c<n;c++)
        if(pac[r][c]&&atl[r][c]) result.Add(new[]{r,c});
    return result;
}`,alt:""}},

{id:"l28",name:"Word Search",lcNum:"79",diff:"medium",pattern:"DFS / Backtracking",alts:["Trie (for Word Search II)"],
approach:"DFS + backtracking from each cell matching word[0]. At each step try 4 directions. Mark cell as visited by temporarily replacing with '#'. Restore after backtrack. O(m·n·4^L) time where L=word length. O(L) space for recursion stack.",
followups:["Word Search II (LC 212) — search multiple words, use Trie","Boggle (find all dictionary words)","Word Break (LC 139) — DP variant","Unique Paths (LC 62)"],
similar:["Word Search II","Path Sum","Sudoku Solver"],
notes:"Backtrack by restoring grid[r][c] after recursive call. The '#' trick is cleaner than a visited bool array. For multiple words (LC 212), build a Trie first to prune DFS early — without it TLE is common.",date:"2026-03-14",
solution:{brute:`// There is no meaningfully worse brute force — backtracking IS the approach.
// A naive check of all paths without pruning:
public bool ExistNoPrune(char[][] board, string word) {
    int m = board.Length, n = board[0].Length;
    bool Found(int r, int c, int idx, bool[][] vis) {
        if (idx == word.Length) return true;
        if (r<0||r>=m||c<0||c>=n||vis[r][c]||board[r][c]!=word[idx]) return false;
        vis[r][c]=true;
        bool res = Found(r+1,c,idx+1,vis)||Found(r-1,c,idx+1,vis)||
                   Found(r,c+1,idx+1,vis)||Found(r,c-1,idx+1,vis);
        vis[r][c]=false;
        return res;
    }
    for(int r=0;r<m;r++) for(int c=0;c<n;c++)
        if(Found(r,c,0,new bool[m][])) return true;
    return false;
}`,why:`Word Search requires trying all paths — backtracking is optimal here. The '#' in-place marking trick avoids an O(m·n) visited array. Pruning on board[r][c] != word[idx] is crucial for practical performance.`,optimal:`// OPTIMAL — DFS + Backtracking with in-place marking — O(m·n·4^L) time, O(L) space
public bool Exist(char[][] board, string word) {
    int m = board.Length, n = board[0].Length;

    bool Dfs(int r, int c, int idx) {
        if (idx == word.Length) return true;
        if (r<0||r>=m||c<0||c>=n||board[r][c]!=word[idx]) return false;

        char temp = board[r][c];
        board[r][c] = '#';  // mark visited in-place

        bool found = Dfs(r+1,c,idx+1)||Dfs(r-1,c,idx+1)||
                     Dfs(r,c+1,idx+1)||Dfs(r,c-1,idx+1);

        board[r][c] = temp;  // restore (backtrack)
        return found;
    }

    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            if (Dfs(r, c, 0)) return true;
    return false;
}`,alt:""}},

{id:"l29",name:"Course Schedule",lcNum:"207",diff:"medium",pattern:"DFS / Backtracking",alts:["BFS (Kahn's Algorithm)","Topological Sort"],
approach:"Build directed graph from prerequisites. DFS cycle detection using 3-state coloring: 0=unvisited, 1=visiting (in current path), 2=done. If we reach a node in state 1 → cycle → impossible. O(V+E) time O(V+E) space.",
followups:["Course Schedule II (LC 210) — return the actual order","Alien Dictionary (LC 269) — build graph from word ordering","Sequence Reconstruction (LC 444)","Minimum Height Trees (LC 310)"],
similar:["Course Schedule II","Alien Dictionary","Minimum Height Trees"],
notes:"Kahn's (BFS) is often easier to code in interviews. DFS needs the 3-state visited array — 2 states is wrong (causes false negatives). order.Count < n → cycle exists (for Kahn's). Both are O(V+E).",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Try all orderings, check if valid — O(n! · (V+E)) — infeasible
// Real brute force: BFS/DFS cycle detection — O(V+E) — shown as 3-color DFS
public bool CanFinishDFS(int numCourses, int[][] prerequisites) {
    var graph = Enumerable.Range(0,numCourses).Select(_=>new List<int>()).ToList();
    foreach(var p in prerequisites) graph[p[1]].Add(p[0]);
    int[] color = new int[numCourses]; // 0=white,1=gray,2=black

    bool HasCycle(int v) {
        color[v]=1;
        foreach(int nb in graph[v]) {
            if(color[nb]==1) return true;  // back edge = cycle
            if(color[nb]==0 && HasCycle(nb)) return true;
        }
        color[v]=2; return false;
    }
    for(int i=0;i<numCourses;i++) if(color[i]==0 && HasCycle(i)) return false;
    return true;
}`,why:`DFS with 3-color cycle detection works but is recursive (stack overflow risk on large inputs). Kahn's BFS is iterative, easier to code, and naturally gives you the completion order. Both are O(V+E).`,optimal:`// OPTIMAL — Kahn's BFS (in-degree) — O(V+E) time, O(V+E) space
public bool CanFinish(int numCourses, int[][] prerequisites) {
    var graph = Enumerable.Range(0, numCourses).Select(_ => new List<int>()).ToList();
    int[] inDegree = new int[numCourses];

    foreach (var p in prerequisites) {
        graph[p[1]].Add(p[0]);
        inDegree[p[0]]++;
    }

    var queue = new Queue<int>();
    for (int i = 0; i < numCourses; i++)
        if (inDegree[i] == 0) queue.Enqueue(i);  // no prerequisites

    int processed = 0;
    while (queue.Count > 0) {
        int course = queue.Dequeue();
        processed++;
        foreach (int next in graph[course])
            if (--inDegree[next] == 0) queue.Enqueue(next);
    }

    return processed == numCourses;  // if cycle: some nodes never reach in-degree 0
}`,alt:""}},

{id:"l30",name:"All Paths From Source to Target",lcNum:"797",diff:"medium",pattern:"DFS / Backtracking",alts:["BFS (collect all paths)"],
approach:"DFS + backtracking from node 0 to node n-1. Maintain current path list. At each node push to path, explore all neighbors, pop after returning. When node == n-1, add copy of path to result. O(2^n · n) time (exponential paths in DAG). O(n) space for recursion.",
followups:["Course Schedule (LC 207) — same graph, cycle detection","Number of Ways to Arrive at Destination (LC 1976)","Find if Path Exists in Graph (LC 1971)","Count All Paths in DAG"],
similar:["Course Schedule","Find if Path Exists in Graph","Network Delay Time"],
notes:"DAG is given so no cycle handling needed. Always collect a copy of the path (new List<int>(path)) not the reference — common bug. Backtracking pop is path.RemoveAt(path.Count - 1).",date:"2026-03-14",
solution:{brute:`// Backtracking IS the approach — no meaningful brute force to compare.
// Iterative BFS collecting paths (for comparison — uses more memory):
public IList<IList<int>> AllPathsSourceTargetBFS(int[][] graph) {
    var result = new List<IList<int>>();
    int target = graph.Length - 1;
    var queue = new Queue<List<int>>();
    queue.Enqueue(new List<int>{0});
    while (queue.Count > 0) {
        var path = queue.Dequeue();
        int node = path.Last();
        if (node == target) { result.Add(path); continue; }
        foreach (int nb in graph[node]) {
            var newPath = new List<int>(path) { nb };
            queue.Enqueue(newPath);
        }
    }
    return result;
}`,why:`BFS stores entire paths in queue — O(2^n · n) space. DFS + backtracking uses O(n) space (just the current path on stack), backtracking after each recursive call. For collecting all paths, DFS is the standard approach.`,optimal:`// OPTIMAL — DFS + Backtracking — O(2^n · n) time, O(n) extra space
public IList<IList<int>> AllPathsSourceTarget(int[][] graph) {
    var result = new List<IList<int>>();
    int target = graph.Length - 1;

    void Dfs(int node, List<int> path) {
        path.Add(node);
        if (node == target) {
            result.Add(new List<int>(path));  // add a COPY
        } else {
            foreach (int nb in graph[node]) Dfs(nb, path);
        }
        path.RemoveAt(path.Count - 1);  // backtrack
    }

    Dfs(0, new List<int>());
    return result;
}`,alt:""}},

{id:"l31",name:"Coin Change",lcNum:"322",diff:"medium",pattern:"Dynamic Programming",alts:["BFS (unweighted)","DFS + Memoization"],
approach:"1D DP bottom-up. dp[i] = min coins to make amount i. Initialize dp[0]=0, rest=INT_MAX. For each amount from 1 to amount, try all coins: dp[i] = min(dp[i], dp[i-coin]+1) if i>=coin and dp[i-coin]!=INT_MAX. O(amount·coins) time O(amount) space.",
followups:["Coin Change 2 (LC 518) — count number of ways","Perfect Squares (LC 279) — same template, coins are perfect squares","Minimum Cost For Tickets (LC 983)","Jump Game VI (LC 1696)"],
similar:["Coin Change 2","Perfect Squares","Minimum Cost for Tickets"],
notes:"Initialize with amount+1 (not INT_MAX) to avoid overflow on +1. Final answer: dp[amount] > amount → -1 (impossible). Unbounded knapsack family — each coin can be reused. Top-down memoization is equally valid.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Recursion without memoization — O(amount^coins) — TLE
public int CoinChangeBrute(int[] coins, int amount) {
    if (amount == 0) return 0;
    if (amount < 0) return -1;
    int min = int.MaxValue;
    foreach (int coin in coins) {
        int sub = CoinChangeBrute(coins, amount - coin);
        if (sub >= 0) min = Math.Min(min, sub + 1);
    }
    return min == int.MaxValue ? -1 : min;
}`,why:`Recursion recomputes the same sub-amounts repeatedly (overlapping subproblems). Bottom-up DP fills a table once: dp[i] = minimum coins for amount i, built from smaller amounts. O(amount × |coins|) time, O(amount) space.`,optimal:`// OPTIMAL — Bottom-Up DP (1D) — O(amount·coins) time, O(amount) space
public int CoinChange(int[] coins, int amount) {
    var dp = new int[amount + 1];
    Array.Fill(dp, amount + 1);  // use amount+1 as "infinity" (avoids overflow)
    dp[0] = 0;

    for (int i = 1; i <= amount; i++)
        foreach (int coin in coins)
            if (coin <= i)
                dp[i] = Math.Min(dp[i], dp[i - coin] + 1);

    return dp[amount] > amount ? -1 : dp[amount];
}`,alt:`// ALTERNATE — Top-Down (Memoization) — O(amount·coins) time, O(amount) space
public int CoinChangeMemo(int[] coins, int amount) {
    int[] memo = new int[amount + 1];
    Array.Fill(memo, -2);  // -2 = uncomputed, -1 = impossible

    int Dp(int rem) {
        if (rem == 0) return 0;
        if (rem < 0) return -1;
        if (memo[rem] != -2) return memo[rem];
        int min = int.MaxValue;
        foreach (int coin in coins) {
            int sub = Dp(rem - coin);
            if (sub >= 0) min = Math.Min(min, sub + 1);
        }
        return memo[rem] = min == int.MaxValue ? -1 : min;
    }
    return Dp(amount);
}`}},

{id:"l32",name:"Longest Increasing Subsequence",lcNum:"300",diff:"medium",pattern:"Dynamic Programming",alts:["Binary Search (Patience Sorting — O(n log n))"],
approach:"O(n²) DP: dp[i] = length of LIS ending at index i. For each i, dp[i] = max(dp[j]+1) for all j<i where nums[j]<nums[i]. Answer is max(dp). O(n log n) alternative: maintain tails array, binary search for insertion position of each element.",
followups:["Longest Common Subsequence (LC 1143)","Russian Doll Envelopes (LC 354) — 2D LIS","Number of LIS (LC 673)","Minimum Number of Increasing Subsequences"],
similar:["Russian Doll Envelopes","Number of Longest Increasing Subsequences","Longest Common Subsequence"],
notes:"O(n log n) patience sorting: tails[i] = smallest tail of all increasing subsequences of length i+1. Binary search for position to insert/replace. This doesn't give the actual subsequence easily — mention this limitation.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — O(n²) DP — standard approach (not really brute force)
public int LengthOfLISDp(int[] nums) {
    int n = nums.Length;
    int[] dp = new int[n];
    Array.Fill(dp, 1);
    for (int i = 1; i < n; i++)
        for (int j = 0; j < i; j++)
            if (nums[j] < nums[i])
                dp[i] = Math.Max(dp[i], dp[j] + 1);
    return dp.Max();
}`,why:`O(n²) DP checks all previous elements for each position. The key insight for O(n log n): maintain a 'tails' array where tails[i] = smallest tail element of all increasing subsequences of length i+1. Binary search to find where to insert/replace each element.`,optimal:`// OPTIMAL — Patience Sorting (Binary Search) — O(n log n) time, O(n) space
public int LengthOfLIS(int[] nums) {
    var tails = new List<int>();  // tails[i] = smallest tail of LIS of length i+1

    foreach (int num in nums) {
        int lo = 0, hi = tails.Count;
        // binary search for first tail >= num (lower bound)
        while (lo < hi) {
            int mid = lo + (hi - lo) / 2;
            if (tails[mid] < num) lo = mid + 1;
            else hi = mid;
        }
        if (lo == tails.Count) tails.Add(num);  // new longest subsequence
        else tails[lo] = num;                    // replace — same length, smaller tail
    }
    return tails.Count;
}`,alt:""}},

{id:"l33",name:"Longest Common Subsequence",lcNum:"1143",diff:"medium",pattern:"Dynamic Programming",alts:["Memoization (top-down)"],
approach:"2D DP. dp[i][j] = LCS length of s1[0..i-1] and s2[0..j-1]. If s1[i-1]==s2[j-1]: dp[i][j] = dp[i-1][j-1]+1. Else: dp[i][j] = max(dp[i-1][j], dp[i][j-1]). O(m·n) time O(m·n) space (optimizable to O(min(m,n))).",
followups:["Edit Distance (LC 72) — related 2D DP","Shortest Common Supersequence (LC 1092)","Delete Operation for Two Strings (LC 583)","Minimum ASCII Delete Sum (LC 712)"],
similar:["Edit Distance","Shortest Common Supersequence","Delete Operation for Two Strings"],
notes:"LCS is the base for Edit Distance (substitution adds +1 to non-match case). Space optimization: only need previous row → O(n) space. Can reconstruct actual subsequence by backtracking through dp table.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Recursion without memoization — O(2^(m+n)) — TLE
public int LcsBrute(string s1, string s2) {
    int Rec(int i, int j) {
        if (i == 0 || j == 0) return 0;
        if (s1[i-1] == s2[j-1]) return 1 + Rec(i-1, j-1);
        return Math.Max(Rec(i-1, j), Rec(i, j-1));
    }
    return Rec(s1.Length, s2.Length);
}`,why:`Recursion has exponential overlapping subproblems. 2D DP table: dp[i][j] = LCS length of first i chars of s1 and first j chars of s2. Each cell computed once. O(m·n) time and space.`,optimal:`// OPTIMAL — 2D Bottom-Up DP — O(m·n) time, O(m·n) space
public int LongestCommonSubsequence(string text1, string text2) {
    int m = text1.Length, n = text2.Length;
    var dp = new int[m + 1, n + 1];

    for (int i = 1; i <= m; i++)
        for (int j = 1; j <= n; j++)
            if (text1[i-1] == text2[j-1])
                dp[i,j] = dp[i-1,j-1] + 1;           // chars match: extend
            else
                dp[i,j] = Math.Max(dp[i-1,j], dp[i,j-1]);  // take best of skip-left or skip-right

    return dp[m, n];
}`,alt:`// ALTERNATE — Space-Optimized O(n) space (rolling array)
public int LcsOptimized(string text1, string text2) {
    int m = text1.Length, n = text2.Length;
    var prev = new int[n + 1];
    for (int i = 1; i <= m; i++) {
        var curr = new int[n + 1];
        for (int j = 1; j <= n; j++)
            curr[j] = text1[i-1]==text2[j-1] ? prev[j-1]+1 : Math.Max(prev[j],curr[j-1]);
        prev = curr;
    }
    return prev[n];
}`}},

{id:"l34",name:"Edit Distance",lcNum:"72",diff:"hard",pattern:"Dynamic Programming",alts:["Memoization (top-down)"],
approach:"2D DP. dp[i][j] = min operations to convert word1[0..i-1] to word2[0..j-1]. Base: dp[i][0]=i, dp[0][j]=j. If chars match: dp[i][j]=dp[i-1][j-1]. Else: dp[i][j] = 1 + min(dp[i-1][j] (delete), dp[i][j-1] (insert), dp[i-1][j-1] (replace)). O(m·n) time and space.",
followups:["Minimum ASCII Delete Sum (LC 712)","One Edit Distance (LC 161)","Longest Common Subsequence (LC 1143) — foundation","Uncrossed Lines (LC 1035)"],
similar:["Longest Common Subsequence","One Edit Distance","Minimum ASCII Delete Sum"],
notes:"Three operations map to three neighbors in DP table: dp[i-1][j]=delete from word1, dp[i][j-1]=insert into word1, dp[i-1][j-1]=replace. When chars match, replace is free (dp[i-1][j-1]). Classic hard 2D DP.",date:"2026-03-14",
solution:{brute:`// BRUTE FORCE — Recursive without memoization — O(3^(m+n)) — TLE
public int MinDistanceBrute(string word1, string word2) {
    int Rec(int i, int j) {
        if (i == 0) return j;
        if (j == 0) return i;
        if (word1[i-1] == word2[j-1]) return Rec(i-1, j-1);
        return 1 + Math.Min(Rec(i-1,j), Math.Min(Rec(i,j-1), Rec(i-1,j-1)));
    }
    return Rec(word1.Length, word2.Length);
}`,why:`Three recursive calls per state = exponential. DP stores results: dp[i][j] = min operations to convert word1[0..i-1] to word2[0..j-1]. Each cell computed once from its three neighbors. O(m·n) time.`,optimal:`// OPTIMAL — 2D Bottom-Up DP — O(m·n) time, O(m·n) space
public int MinDistance(string word1, string word2) {
    int m = word1.Length, n = word2.Length;
    var dp = new int[m + 1, n + 1];

    // base cases: convert to/from empty string
    for (int i = 0; i <= m; i++) dp[i, 0] = i;  // delete all chars
    for (int j = 0; j <= n; j++) dp[0, j] = j;  // insert all chars

    for (int i = 1; i <= m; i++)
        for (int j = 1; j <= n; j++)
            if (word1[i-1] == word2[j-1])
                dp[i,j] = dp[i-1,j-1];   // chars match — free
            else
                dp[i,j] = 1 + Math.Min(dp[i-1,j],      // delete from word1
                               Math.Min(dp[i,j-1],       // insert into word1
                                        dp[i-1,j-1]));   // replace

    return dp[m, n];
}`,alt:""}},

approach:"0/1 Knapsack. Target = totalSum/2 (if odd → false). dp[j] = true if subset summing to j exists. Process each number: iterate j from target down to num, set dp[j] |= dp[j-num]. O(n·target) time O(target) space.",
